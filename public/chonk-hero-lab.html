    document.body.classList.remove('dragging');
  }

  canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    onDragStart(e.clientX);
  });
  window.addEventListener('mousemove', (e) => onDragMove(e.clientX), { passive: true });
  window.addEventListener('mouseup', onDragEnd);
  window.addEventListener('mouseleave', onDragEnd);

  canvas.addEventListener('touchstart', (e) => {
    if (!e.touches[0]) return;
    onDragStart(e.touches[0].clientX);
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (!e.touches[0]) return;
    onDragMove(e.touches[0].clientX);
  }, { passive: true });
  window.addEventListener('touchend', onDragEnd);
  window.addEventListener('touchcancel', onDragEnd);

  /* ---------- UI scroll fades ---------- */
  const scrollHint = document.getElementById('scrollHint');
  const holdSip    = document.getElementById('holdSip');
  const vignettes  = Array.from(document.querySelectorAll('.vignette'));

  function updateUIOnScroll() {
    if (getScrollY() > 50) scrollHint.classList.add('hidden');
    else scrollHint.classList.remove('hidden');

    if (state.scrollProgress > 0.7) holdSip.classList.add('visible');
    else holdSip.classList.remove('visible');

    const viewportMid = getScrollY() + window.innerHeight * 0.5;
    for (const v of vignettes) {
      const top = v.offsetTop;
      const dist = Math.abs(top - viewportMid);
      if (dist < window.innerHeight * 0.6) v.classList.add('visible');
      else v.classList.remove('visible');
    }
  }

  /* ---------- Resize ---------- */
  function onResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);

    // Center the cup in the viewport in world space, using the
    // current FOV + camera depth to translate screen fraction → world X.
    const CUP_SCREEN_X = 0.5;
    const fovRad = (camera.fov * Math.PI) / 180;
    const viewH = 2 * Math.abs(camera.position.z) * Math.tan(fovRad / 2);
    const viewW = viewH * camera.aspect;
    cupGroup.position.x = (CUP_SCREEN_X - 0.5) * viewW;
  }
  window.addEventListener('resize', onResize);

  /* ---------- Animation ---------- */
  //
  // Lab variant: five-stage keyframe camera rig driven by scrollProgress.
  //   0.00–0.15  Establish  — cup sits at rest, spinning
  //   0.15–0.38  Bird's-eye — camera lifts fully overhead looking straight down
  //   0.38–0.58  Above straw— camera slides over the straw mouth + starts descending
  //   0.58–0.78  Enter      — camera drops straight down through the straw into darkness
  //   0.78–1.00  Helix      — camera pitches forward, α-helix fades in ahead
  //
  // Spin stays active through the bird's-eye lift, damps as the camera
  // lines up above the straw, and is locked to a reference angle before
  // descent so the straw mouth sits in a predictable world position.
  // Cup + studio lighting fade out as we cross into darkness; interior
  // point lights fade up to rim-light the helix.
  // Intro assembly animation: on first paint, the scene starts in pure
  // blueprint (wireframe + grids reveal in), holds briefly, then
  // cross-fades to the textured product — matching the on-load reveal
  // you see on igloo.inc. Scroll-driven behaviour kicks in only once
  // the intro completes. reducedMotion skips it entirely.
  // Starting animations removed — scene is live immediately.

  let firstFrameRendered = false;
  let lastFrameTime = 0;
  let lastScrollY = getScrollY();
  let scrollBoost = 0;
  const BASE_ANGULAR_VEL = -0.0006;
  const SCROLL_BOOST_GAIN = -0.00012;
  const SCROLL_BOOST_DECAY = 0.90;
  const MAX_BOOST = 0.012;

  const camTargetPos = new THREE.Vector3(0, 0.15, 9.5);
  const camTargetLook = new THREE.Vector3(0, 0, 0);
  const camCurrentLook = new THREE.Vector3(0, 0, 0);
  let camTargetFov = 32;
  const BASE_FOV  = 36;
  const WIDE_FOV  = 34;
  const TIGHT_FOV = 22;

  // Straw top in world space when cupGroup.rotation.y = 0. Used as the
  // camera target during the descent so we're actually threading down
  // the straw barrel, not just "somewhere above the cup."
  // Straw is vertical in the lab variant, so straw-top world coords are
  // (pivot.x, pivot.y + strawHeight, pivot.z) scaled by cup scale and
  // translated by cupGroup.position.y. Keep these in sync with the
  // strawPivot.position + strawHeight above.
  const STRAW_TOP_X = 0.22 * 1.1;
  const STRAW_TOP_Y = (1.50 + 1.25) * 1.1 + (-0.35);
  const STRAW_TOP_Z = 0.03 * 1.1;

  // Keyframe table — position + lookAt per stage start/end.
  // Stage 1 (bird's-eye): camera way overhead, looking straight down. A
  // tiny Z offset in the look target avoids the degenerate lookAt case
  // of "up axis parallel to view direction."
  const K = {
    p0: { pos: new THREE.Vector3(0,             0.70, IDLE_CAM_Z), look: new THREE.Vector3(0,            -0.40,         0),             fov: BASE_FOV  },
    p1: { pos: new THREE.Vector3(0,            14.0,  0.1),  look: new THREE.Vector3(0,            -0.35,         0.05),          fov: WIDE_FOV  },
    p2: { pos: new THREE.Vector3(STRAW_TOP_X,   5.2,  STRAW_TOP_Z), look: new THREE.Vector3(STRAW_TOP_X, STRAW_TOP_Y, STRAW_TOP_Z), fov: 28        },
    p3: { pos: new THREE.Vector3(STRAW_TOP_X,   0.6,  STRAW_TOP_Z), look: new THREE.Vector3(STRAW_TOP_X, -2.0,       STRAW_TOP_Z), fov: TIGHT_FOV },
    p4: { pos: new THREE.Vector3(STRAW_TOP_X,  -1.5, -1.5),          look: new THREE.Vector3(STRAW_TOP_X, -1.5,      -4.5),          fov: TIGHT_FOV }
  };

  const tmpPos = new THREE.Vector3();
  const tmpLook = new THREE.Vector3();
  function resolveKeyframe(p, out) {
    if (p <= 0.15)        { out.a = K.p0; out.b = K.p0; out.t = 0;                                         out.inStage = 0; }
    else if (p <= 0.38)   { out.a = K.p0; out.b = K.p1; out.t = smoothstep01((p - 0.15) / (0.38 - 0.15));  out.inStage = 1; }
    else if (p <= 0.58)   { out.a = K.p1; out.b = K.p2; out.t = smoothstep01((p - 0.38) / (0.58 - 0.38));  out.inStage = 2; }
    else if (p <= 0.78)   { out.a = K.p2; out.b = K.p3; out.t = smoothstep01((p - 0.58) / (0.78 - 0.58));  out.inStage = 3; }
    else                  { out.a = K.p3; out.b = K.p4; out.t = smoothstep01((p - 0.78) / (1.00 - 0.78));  out.inStage = 4; }
    return out;
  }
  const kf = { a: K.p0, b: K.p0, t: 0, inStage: 0 };

  function animate() {
    const time = performance.now();
    const dtMs = lastFrameTime ? Math.min(64, time - lastFrameTime) : 16.7;
    lastFrameTime = time;

    // No intro — animate loop sees the finished scene immediately.
    const inIntro = false;
    const tI = 1;

    const scrollY = getScrollY();
    const maxScroll = getScrollMax();
    const rawProg = maxScroll > 0 ? clamp(scrollY / maxScroll, 0, 1) : 0;
    state.scrollProgress = externalProgress !== null ? externalProgress : rawProg;
    // Lock the scene at stage 0 during the intro so scroll input can't
    // drag the camera into the rise stage before the creation sequence
    // finishes playing.
    const p = inIntro ? 0 : state.scrollProgress;

    const scrollDelta = scrollY - lastScrollY;
    lastScrollY = scrollY;
    scrollBoost = scrollBoost * SCROLL_BOOST_DECAY + scrollDelta * SCROLL_BOOST_GAIN;
    scrollBoost = clamp(scrollBoost, -MAX_BOOST, MAX_BOOST);

    // --- Camera rig ---
    resolveKeyframe(p, kf);
    tmpPos.copy(kf.a.pos).lerp(kf.b.pos, kf.t);
    tmpLook.copy(kf.a.look).lerp(kf.b.look, kf.t);
    const targetFov = lerp(kf.a.fov, kf.b.fov, kf.t);

    // Mouse parallax only in stage 0 (gentle), fully off by stage 2.
    const parallaxWeight = 1 - smoothstep01((p - 0.05) / 0.25);
    const mx = (state.mouseX / window.innerWidth  - 0.5) * 0.18 * parallaxWeight;
    const my = (state.mouseY / window.innerHeight - 0.5) * 0.14 * parallaxWeight;
    tmpPos.x += mx;
    tmpPos.y += my;

    if (reducedMotion) {
      camera.position.copy(K.p0.pos);
      camCurrentLook.copy(K.p0.look);
      camera.lookAt(camCurrentLook);
      if (Math.abs(camera.fov - BASE_FOV) > 0.001) {
        camera.fov = BASE_FOV;
        camera.updateProjectionMatrix();
      }
    } else {
      camera.position.lerp(tmpPos, 0.12);
      camCurrentLook.lerp(tmpLook, 0.12);
      camera.lookAt(camCurrentLook);
      if (Math.abs(camera.fov - targetFov) > 0.02) {
        camera.fov = lerp(camera.fov, targetFov, 0.1);
        camera.updateProjectionMatrix();
      }
    }

    // --- Stage-driven scene weights ---
    // Studio fade: cup + studio lights lit through descent start (0.60),
    // off by the time the camera has dropped into the straw (0.76).
    const studioW = 1 - smoothstep01((p - 0.60) / (0.76 - 0.60));
    // Interior pink light: fades in as we descend, peaks with the helix.
    const interiorW = smoothstep01((p - 0.66) / (0.92 - 0.66));
    // Helix alpha: starts revealing as camera pitches forward, full by 0.96.
    const helixW = 0;  // amino helix reveal removed — scroll ends in pure black
    // Spin weight: tapers across the bird's-eye lift so the cup is nearly
    // still by the time we line up over the straw.
    const spinW  = 1 - smoothstep01((p - 0.20) / (0.50 - 0.20));
    const boostW = 1 - smoothstep01((p - 0.20) / (0.42 - 0.20));
    // Rotation lock: ease cup.rotation.y toward 0 so the straw reaches its
    // reference world position by the time the camera is above it.
    const lockW  = smoothstep01((p - 0.28) / (0.52 - 0.28));
    // Tunnel fade: dark inner tube + end cap are solid during descent but
    // fade out at the start of stage 4 so they don't silhouette against
    // the helix reveal or linger as a dark disc once the camera pitches
    // forward into the darkness.
    const tunnelW = 1 - smoothstep01((p - 0.78) / (0.86 - 0.78));

    keyLight.intensity    = KEY_BASE    * studioW;
    fillLight.intensity   = FILL_BASE   * studioW;
    backLight.intensity   = BACK_BASE   * studioW;
    bounce.intensity      = BOUNCE_BASE * studioW;
    ambientLight.intensity = AMBIENT_BASE * studioW;

    interiorLightPink.intensity  = 3.4 * interiorW;
    interiorLightWhite.intensity = 1.8 * interiorW;

    // --- Blueprint cross-fade + intro assembly ---
    // During intro: time-driven. Phase A reveals wireframes + grids in,
    // phase B holds blueprint, phase C crossfades blueprint → textured.
    // After intro: scroll-driven (cup fades back to blueprint as the
    // user scrolls into the rise stage).
    // Blueprint transition is scroll-driven only; intro keeps the cup
    // fully rendered while it rises into place.
    const blueprintBlend = inIntro ? 0 : smoothstep01((p - 0.08) / (0.22 - 0.08));
    const introRevealW = 1;

    const cupBodyAlpha = studioW * (1 - blueprintBlend);
    const wireAlpha    = studioW * blueprintBlend * introRevealW;

    const cupBodyVisible = cupBodyAlpha > 0.004;
    const wireVisible    = wireAlpha    > 0.004;

    for (const m of blueprintFadeMeshes) m.visible = cupBodyVisible;
    for (const w of wireframes)          w.visible = wireVisible;

    if (cupBodyVisible) {
      for (const { mat, baseOpacity } of blueprintFadeMaterials) {
        mat.opacity = baseOpacity * cupBodyAlpha;
      }
    }
    wireframeMat.opacity = wireAlpha;

    blueprintGridMat.opacity  = wireAlpha * 0.85;
    blueprintWallMat.opacity  = wireAlpha * 0.55;  // wall grid subtler than floor grid
    blueprintGrid.visible = wireVisible;
    blueprintWall.visible = wireVisible;

    contactShadowMat.opacity = 0.42 * cupBodyAlpha;
    contactShadow.visible = cupBodyAlpha > 0.02;

    // --- Symbiote morph (milk + honey globs) ---
    // Continuous multi-octave noise displacement along surface normals.
    // Runs every frame so the globs feel alive — form flows in and out
    // of itself, Venom-style.
    for (const body of symbioteBodies) {
      const geom = body.geometry;
      const orig = geom.userData.origPos;
      const pos = geom.attributes.position;
      const tSec = time * 0.001 * body.userData.symbioteSpeed;
      const amp  = body.userData.symbioteAmp;
      const fA = body.userData.symbioteFreqA;
      const fB = body.userData.symbioteFreqB;
      const fC = body.userData.symbioteFreqC;
      const fD = body.userData.symbioteFreqD || 10.0;
      for (let i = 0; i < pos.count; i++) {
        const i3 = i * 3;
        const ox = orig[i3], oy = orig[i3 + 1], oz = orig[i3 + 2];
        const len = Math.sqrt(ox*ox + oy*oy + oz*oz) || 1;
        const nx = ox / len, ny = oy / len, nz = oz / len;
        const n1 = Math.sin(ox * fA + tSec * 0.8) * Math.cos(oy * fA + tSec * 0.6) * Math.sin(oz * fA + tSec * 0.9);
        const n2 = Math.sin(ox * fB + tSec * 1.5) * Math.cos(oy * fB + tSec * 1.3);
        const n3 = Math.sin((ox + oy + oz) * fC + tSec * 0.35);
        const n4 = Math.sin(ox * fD + tSec * 2.6) * Math.sin(oz * fD + tSec * 2.1);
        const disp = n1 * amp + n2 * amp * 0.45 + n3 * amp * 0.55 + n4 * amp * 0.25;
        pos.setX(i, ox + nx * disp);
        pos.setY(i, oy + ny * disp);
        pos.setZ(i, oz + nz * disp);
      }
      pos.needsUpdate = true;
      geom.computeVertexNormals();
    }

    // --- Protein powder: symbiote-style multi-octave morph along radial
    // normals so the whole cloud breathes and ripples like the milk +
    // honey globs (but expressed through particle positions, not a
    // meshed surface).
    for (const body of powderBodies) {
      const geom = body.geometry;
      const orig = geom.userData.origPos;
      const posArr = geom.attributes.position.array;
      const amp = body.userData.powderDriftAmp;
      const tSec = time * 0.001 * body.userData.powderDriftSpeed;
      const count = posArr.length / 3;
      for (let i = 0; i < count; i++) {
        const i3 = i * 3;
        const ox = orig[i3], oy = orig[i3 + 1], oz = orig[i3 + 2];
        const len = Math.sqrt(ox*ox + oy*oy + oz*oz) || 1;
        const nx = ox / len, ny = oy / len, nz = oz / len;
        // Three-octave noise: primary swell + mid tendrils + fine ripple.
        const n1 = Math.sin(ox * 3.2 + tSec * 0.9) * Math.cos(oy * 3.2 + tSec * 0.7) * Math.sin(oz * 3.2 + tSec * 1.1);
        const n2 = Math.sin(ox * 6.8 + tSec * 1.7) * Math.cos(oy * 6.8 + tSec * 1.3);
        const n3 = Math.sin((ox + oy + oz) * 1.8 + tSec * 0.4);
        const disp = n1 * amp + n2 * amp * 0.45 + n3 * amp * 0.55;
        // Per-particle tangential wobble so particles don't all move as one.
        const tw = Math.sin(tSec * 1.3 + i * 0.41) * amp * 0.35;
        posArr[i3]     = ox + nx * disp + Math.cos(i * 0.37) * tw;
        posArr[i3 + 1] = oy + ny * disp + Math.sin(i * 0.41) * tw;
        posArr[i3 + 2] = oz + nz * disp + Math.cos(i * 0.29) * tw * 0.7;
      }
      geom.attributes.position.needsUpdate = true;
    }

    // --- Chonk solar system: orbits + blueprint crossfade + suck-in ---
    // Orbit motion runs throughout stages 0-1. Across scroll 0.35 → 0.52
    // each orbiter spirals inward, angular speed boosts, radius shrinks,
    // scale drops — they get vacuumed into the opened cup exactly when
    // the lid is lifted so they appear to dive into the liquid.
    const suckT = inIntro ? 0 : smoothstep01((p - 0.35) / (0.52 - 0.35));
    // Fruit lifecycle: rendered → dots → sucked in. Rendered fades out
    // 0.08 → 0.22 while the point cloud fades in 0.10 → 0.25 — overlap
    // gives a "dissolve to particles" read before suck-in takes them.
    const fruitDotBlend = inIntro ? 0 : smoothstep01((p - 0.10) / (0.25 - 0.10));
    const fruitAlpha = inIntro ? 0 : studioW * (1 - suckT * 0.94);
    const fruitRenderAlpha = fruitAlpha * (1 - blueprintBlend);
    const fruitDotAlpha    = fruitAlpha * fruitDotBlend;
    const fruitVisible = fruitAlpha > 0.005;
    fruitGroup.visible = fruitVisible;
    if (fruitVisible) {
      for (const { mat, baseOpacity } of fruitFadeMaterials) {
        mat.opacity = baseOpacity * fruitRenderAlpha;
      }
      for (const { mat } of fruitDotClouds) {
        mat.opacity = fruitDotAlpha;
      }
      const orbitTime = time * 0.001;
      const SUCK_X = 0.00;
      const SUCK_Y = 1.30;  // open cup mouth when lid is lifted
      const SUCK_Z = 0.00;
      for (const o of fruitOrbits) {
        // Base orbital angle + extra spin during suck-in.
        const angle = o.phase + orbitTime * o.speed + suckT * 6.0;
        const r = o.radius * (1 - suckT);
        const ox = Math.cos(angle) * r;
        const orbYZ = Math.sin(angle) * r;
        // Tilt orbit plane by inclination around the X axis.
        const oy = -Math.sin(o.inclination) * orbYZ + o.planeY;
        const oz =  Math.cos(o.inclination) * orbYZ;
        // Lerp toward cup mouth as suckT rises.
        const fx = lerp(ox, SUCK_X, suckT);
        const fy = lerp(oy, SUCK_Y, suckT);
        const fz = lerp(oz, SUCK_Z, suckT);
        // Bob fades out during suck-in so the dive-in reads clean.
        const bob = Math.sin(orbitTime * o.bobSpeed + o.bobPhase) * o.bobAmp * (1 - suckT);

        // Cursor-rebound spring: applies the hover impulse as offset,
        // damped + sprung back toward 0 each frame. Mildly under-damped
        // so you get a visible overshoot / return swing.
        const SPRING_K = 42;
        const SPRING_D = 7.5;
        const dtS = dtMs / 1000;
        const fX = -SPRING_K * o.hoverOffX - SPRING_D * o.hoverVelX;
        const fY = -SPRING_K * o.hoverOffY - SPRING_D * o.hoverVelY;
        const fZ = -SPRING_K * o.hoverOffZ - SPRING_D * o.hoverVelZ;
        o.hoverVelX += fX * dtS;
        o.hoverVelY += fY * dtS;
        o.hoverVelZ += fZ * dtS;
        o.hoverOffX += o.hoverVelX * dtS;
        o.hoverOffY += o.hoverVelY * dtS;
        o.hoverOffZ += o.hoverVelZ * dtS;

        o.mesh.position.set(
          fx + o.hoverOffX,
          fy + bob + o.hoverOffY,
          fz + o.hoverOffZ
        );
        // Scale shrinks into the cup.
        const s = o.baseScale * Math.max(0.04, 1 - suckT * 0.96);
        o.mesh.scale.setScalar(s);
        // Axial spin + base tilt (so the fruit sits at its "pose" angle
        // but also rotates slowly on its own axis).
        o.mesh.rotation.y = orbitTime * o.axialSpin;
        o.mesh.rotation.z = o.baseRotZ;
      }
    }

    // --- Blueprint ripple dispersion ---
    // Particles burst outward from the straw apex during the rendered
    // → blueprint transition window. Each particle has a staggered
    // life-offset so the cloud appears as continuous waves rather than
    // a single synchronous shell. Active only during scroll (skipped
    // entirely in intro, where the creation storm covers this beat).
    const RIPPLE_START = 0.04;
    const RIPPLE_END   = 0.28;
    const rippleWindowT = (p - RIPPLE_START) / (RIPPLE_END - RIPPLE_START);
    const rippleActive = !inIntro && rippleWindowT > 0 && rippleWindowT < 1;
    if (rippleActive) {
      const rPos = rippleGeom.attributes.position.array;
      const LIFE = 0.38; // each particle's visible life (fraction of window)
      for (let i = 0; i < RIPPLE_COUNT; i++) {
        const particleStart = rippleLife[i] * (1 - LIFE);
        const particleT = (rippleWindowT - particleStart) / LIFE;
        if (particleT < 0 || particleT > 1) {
          // Not currently active — park at origin so it's behind visible particles.
          rPos[i*3]   = RIPPLE_ORIGIN_X;
          rPos[i*3+1] = RIPPLE_ORIGIN_Y;
          rPos[i*3+2] = RIPPLE_ORIGIN_Z;
          continue;
        }
        // Ease-out travel: fast at first, slowing as it approaches max reach.
        const travel = 1 - (1 - particleT) * (1 - particleT);
        const dist = travel * rippleSpeed[i];
        rPos[i*3]   = RIPPLE_ORIGIN_X + rippleDirX[i] * dist;
        rPos[i*3+1] = RIPPLE_ORIGIN_Y + rippleDirY[i] * dist;
        rPos[i*3+2] = RIPPLE_ORIGIN_Z + rippleDirZ[i] * dist;
      }
      rippleGeom.attributes.position.needsUpdate = true;
      // Opacity envelope — ramp in quickly, hold, fade out toward end.
      let rippleOp;
      if (rippleWindowT < 0.15)      rippleOp = smoothstep01(rippleWindowT / 0.15);
      else if (rippleWindowT < 0.70) rippleOp = 1;
      else                           rippleOp = 1 - smoothstep01((rippleWindowT - 0.70) / 0.30);
      rippleMat.opacity = rippleOp * 0.95;
      ripplePoints.visible = true;
    } else if (ripplePoints.visible) {
      ripplePoints.visible = false;
    }

    // --- Exploded-view: lid lifts off + liquid reveal ---
    // During intro: the cup FORMS ITSELF — lid starts lifted off the
    // body and descends into place as the wireframes reveal, so the
    // first thing the user sees is parts coming together.
    // During scroll: the lid lifts back off across 0.22 → 0.40 to
    // reveal the liquid, holds apart through bird's-eye, then
    // reassembles 0.52 → 0.60 before the tunnel descent.
    const LID_LIFT_MAX = 1.25;
    const scrollSepUp   = smoothstep01((p - 0.30) / (0.45 - 0.30));
    const scrollSepDown = smoothstep01((p - 0.52) / (0.60 - 0.52));
    const scrollSeparationW = scrollSepUp * (1 - scrollSepDown);

    // During intro the cup is assembled as a unit rising from the floor;
    // separation only happens later during scroll.
    const separationW = inIntro ? 0 : scrollSeparationW;
    topAssembly.position.y = LID_LIFT_MAX * separationW;

    // Liquid is reserved for the scroll reveal — intentionally hidden
    // during intro so the scroll-driven "lid lifts, liquid appears"
    // beat lands cleanly later without being previewed.
    const liquidAlpha = inIntro ? 0 : scrollSeparationW * studioW * 0.95;
    liquidMat.opacity = liquidAlpha;
    liquidMesh.visible = liquidAlpha > 0.01;

    const tunnelVisible = tunnelW > 0.01;
    innerTube.visible = tunnelVisible;
    innerCap.visible = tunnelVisible;
    if (tunnelVisible) {
      innerTubeMat.opacity = tunnelW;
      innerCapMat.opacity = tunnelW;
    }

    const helixVisible = helixW > 0.004;
    aminoGroup.visible = helixVisible;
    if (helixVisible) {
      for (const m of aminoFadeMaterials) m.opacity = helixW;
    }

    // --- Cup transform ---
    // Upright-lerp: cup carries its branded forward/left tilts + idle
    // bob/sway during the establishing shot, then gradually straightens
    // to a perfect upright as the camera rises. By the time we're at
    // bird's-eye (p ≥ 0.40) the straw axis is precisely vertical, which
    // is what makes STRAW_TOP_X/Y/Z a reliable camera target for the
    // straight-down descent and keeps the dark inner tube aligned with
    // the outer white straw.
    const angularVel = (BASE_ANGULAR_VEL + scrollBoost * boostW) * spinW;
    cupGroup.rotation.y += angularVel * dtMs;
    if (lockW > 0.001) {
      const diff = -cupGroup.rotation.y;
      const wrapped = Math.atan2(Math.sin(diff), Math.cos(diff));
      cupGroup.rotation.y += wrapped * lockW * 0.08;
    }

    // Delayed to start well after the user first begins scrolling, so
    // the shake stays EXACTLY in its idle pose during the opening scroll.
    const uprightW = smoothstep01((p - 0.30) / (0.50 - 0.30));
    const idleW = 1 - uprightW;
    const bob  = reducedMotion ? 0 : Math.sin(time * 0.0011) * 0.025;
    const sway = reducedMotion ? 0 : Math.sin(time * 0.0008) * 0.012;

    // Force-field breathing: subtle continuous scale pulse on the shake.
    // Attenuated during intro rise and tunnel fade so it's only alive
    // in the rendered-orbit window.
    const breathScale = 1 + Math.sin(time * 0.0007) * 0.010 * (inIntro ? 0.2 : studioW);
    cupGroup.scale.setScalar(CUP_SCALE * breathScale);
    cupGroup.rotation.x = CUP_BASE_TILT_X * idleW;
    cupGroup.rotation.z = (CUP_BASE_TILT_Z + sway) * idleW;
    cupGroup.position.y = (bob * idleW) - 0.35;

    // --- Helix slow spin once fully revealed ---
    if (helixVisible && p > 0.88) {
      aminoGroup.rotation.y += 0.0009 * dtMs;
    }

    // --- Force field: close-orbit aura of pink motes around the shake ---
    const forceAlpha = inIntro
      ? 0
      : studioW * (1 - blueprintBlend * 0.60) * 0.55;
    forceMat.opacity = forceAlpha;
    forcePoints.visible = forceAlpha > 0.005;
    if (forcePoints.visible) {
      const fPos = forceGeom.attributes.position.array;
      const tSec = time * 0.001;
      for (let i = 0; i < FORCE_COUNT; i++) {
        const ang = forcePhase[i] + tSec * forceSpeed[i];
        fPos[i*3]   = Math.cos(ang) * forceRadius[i];
        fPos[i*3+1] = forceHeight[i] + Math.sin(tSec * 0.45 + forcePhase[i]) * forceWobble[i];
        fPos[i*3+2] = Math.sin(ang) * forceRadius[i];
      }
      forceGeom.attributes.position.needsUpdate = true;
    }

    renderer.render(scene, camera);

    if (!firstFrameRendered) {
      firstFrameRendered = true;
      const loader = document.getElementById('loader');
      requestAnimationFrame(() => loader.classList.add('hidden'));
    }

    requestAnimationFrame(animate);
  }

  let pendingScroll = false;
  scrollHost.addEventListener('scroll', () => {
    if (pendingScroll) return;
    pendingScroll = true;
    requestAnimationFrame(() => {
      updateUIOnScroll();
      pendingScroll = false;
    });
  }, { passive: true });

  onResize();
  updateUIOnScroll();
  animate();

  window.addEventListener('webglcontextlost', (e) => {
    e.preventDefault();
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    loader.querySelector('.mark').textContent = 'reload me';
  });
})();
</script>


</body></html>
