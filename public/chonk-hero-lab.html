  /* Brand fonts (MADE Waffle Slab + Waffle Soft, base64-embedded) */
  @import url('../fonts/fonts.css');
  /* Body — Inter via Google Fonts */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #fef6fc;
    --ink:       #1A1614;
    --muted:     rgba(26, 22, 20, 0.60);
    --accent:    #ffd8f3;

    /* Typography — mirrors /colors_and_type.css */
    --font-display: 'MADE Waffle Slab', 'Archivo Black', sans-serif;
    --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;

    --text-eyebrow: 13px;
    --text-body:    16px;

    --tracking-widest: 0.14em;
    --leading-base:    1.5;
  }

  html, body {
    width: 100%;
    color: var(--ink);
    font-family: var(--font-body);
    font-size: var(--text-body);
    line-height: var(--leading-base);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    background: transparent;
  }

  body {
    min-height: 500vh;
    background: transparent;
  }

  canvas#scene {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    display: block;
  }

  .ui {
    position: fixed;
    z-index: 10;
    color: var(--ink);
    font-family: var(--font-display);
    font-weight: 800;
    letter-spacing: var(--tracking-widest);
    font-size: var(--text-eyebrow);
    text-transform: uppercase;
    opacity: 0.85;
    pointer-events: none;
    user-select: none;
  }
  .ui a { color: inherit; text-decoration: none; pointer-events: auto; }

  .ui.top-left  { top: 28px; left: 32px; }
  .ui.top-right { top: 28px; right: 32px; display: flex; align-items: center; gap: 10px; }
  .ui.bottom-center {
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 6px;
    opacity: 0.65;
    color: var(--muted);
    animation: scrollBounce 1.8s ease-in-out infinite;
    transition: opacity 0.6s ease;
  }
  .ui.bottom-center.hidden { opacity: 0; }

  .ui.bottom-right {
    bottom: 28px; right: 32px;
    font-size: 11px;
    letter-spacing: 1.5px;
    font-style: italic;
    font-weight: 400;
    text-transform: lowercase;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .ui.bottom-right.visible { opacity: 0.7; }

  .pulse-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(244,167,192,0.6);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.15); } }
  @keyframes scrollBounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -6px); } }

  #loader {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: grid;
    place-items: center;
    background: var(--bg);
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #loader .mark {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(48px, 10vw, 128px);
    color: var(--accent);
    letter-spacing: -0.04em;
    animation: breathe 1.6s ease-in-out infinite;
  }
  @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.04); opacity: 1; } }

  .vignette {
    position: absolute;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 5;
    color: var(--ink);
    text-align: center;
    padding: 0 8vw;
  }
  .vignette h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(28px, 5vw, 60px);
    letter-spacing: -0.02em;
    line-height: 1.05;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .vignette.visible h2 { opacity: 1; transform: translateY(0); }
  .vignette p {
    margin-top: 14px;
    font-family: var(--font-body);
    font-size: var(--text-eyebrow);
    letter-spacing: var(--tracking-widest);
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    transition: opacity 1s ease 0.2s;
  }
  .vignette.visible p { opacity: 0.9; }

  .vignette.v1 { top: 150vh; }
  .vignette.v2 { top: 250vh; }
  .vignette.v4 { top: 350vh; }

  .accent { color: var(--accent); }

  noscript {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--bg); color: var(--ink); z-index: 200; padding: 24px; text-align: center;
  }

  @media (max-width: 640px) {
    .ui.top-left, .ui.top-right { font-size: 11px; letter-spacing: 3px; }
    .ui.top-left { top: 18px; left: 18px; }
    .ui.top-right { top: 18px; right: 18px; }
    .ui.bottom-center, .ui.bottom-right { bottom: 18px; }
    .ui.bottom-right { right: 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .pulse-dot, #loader .mark, .ui.bottom-center { animation: none !important; }
  }

  /* Lab variant: hide all overlay UI so the scene is a pure cinematic stage. */
  #scrollHint, #holdSip, .vignette { display: none !important; }
</style>

<body>

<noscript>This experience needs JavaScript. Enable it to meet the cup.</noscript>

<div id="loader" aria-hidden="true" class="hidden"><div class="mark">chonk!</div></div>

<canvas id="scene" aria-label="Rotating 3D Chonk Shakes cup" width="2080" height="1466" style="width: 1040px; height: 733px;"></canvas>

<div class="ui bottom-center hidden" id="scrollHint">Scroll ↓</div>
<div class="ui bottom-right" id="holdSip">hold. sip. repeat.</div>

<section class="vignette v1 visible" aria-hidden="true">
  <h2>Shake it like you <span class="accent">mean it</span>.</h2>
</section>
<section class="vignette v2" aria-hidden="true">
  <h2>Thick. <span class="accent">Chonky</span>. Made in Perth.</h2>
</section>
<section class="vignette v4" aria-hidden="true">
  <h2>Hold. Sip. <span class="accent">Repeat.</span></h2>
</section>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
/* =============================================================================
 * CHONK SHAKES — hero cup, studio product-shot build
 * ---------------------------------------------------------------------------
 * Matches the reference image: clean off-white backdrop, softly-lit pink
 * ribbed paper cup with frosted translucent dome lid and near-vertical straw.
 *
 * Build order:
 *   1. renderer + camera
 *   2. neutral studio environment (PMREM from soft white/cream gradients)
 *   3. studio-grade 3-point lighting (no color-tinted rims)
 *   4. logo canvas texture ("chonk!" wordmark + leaf glyph + paper grain)
 *   5. cup body (LatheGeometry, tight ribs, top/bottom smoothly un-ribbed)
 *   6. bottom white base ring, custom lathe lid dome, skirt, seam, straw
 *   7. soft circular contact shadow on the backdrop
 *   8. subtle bloom (threshold high so it just kisses highlights)
 *   9. scroll-driven rotation + gentle idle bob; mouse parallax on camera
 * ===========================================================================*/
(async function () {
  'use strict';

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const lerp  = (a, b, t) => a + (b - a) * t;
  const smoothstep01 = (x) => { x = clamp(x, 0, 1); return x * x * (3 - 2 * x); };

  // Lab variant: the parent React page owns the tall scroll section and
  // computes our 0..1 progress through it, pushed via postMessage on every
  // rAF tick. We keep a fallback to the parent-window scroll shim so the
  // file is still viewable standalone at /chonk-hero-lab.html.
  let externalProgress = null;
  let externalPseudoY = 0;
  let scrollHost = window;
  try {
    if (window.parent && window.parent !== window) scrollHost = window.parent;
  } catch (_) { /* cross-origin → keep own window */ }
  window.addEventListener('message', (e) => {
    const d = e && e.data;
    if (d && d.type === 'chonk-lab-scroll' && typeof d.progress === 'number') {
      externalProgress = clamp(d.progress, 0, 1);
      externalPseudoY = externalProgress * 1000;
    }
  });
  const getScrollY = () => externalProgress !== null ? externalPseudoY : (scrollHost.scrollY || 0);
  const getScrollMax = () => {
    if (externalProgress !== null) return 1000;
    const doc = scrollHost.document && scrollHost.document.documentElement;
    const h = doc ? doc.scrollHeight : 0;
    return Math.max(0, h - scrollHost.innerHeight);
  };

  // Wait for the Waffle Soft webfont to decode before rasterising the logo
  // into a canvas texture. If the Font Loading API is missing we fall
  // through; the ready-handler below regenerates the texture if it arrives
  // after first paint (slow device / FOUT).
  if (document.fonts && document.fonts.load) {
    try { await document.fonts.load('700 400px "Waffle Soft"'); } catch (_) {}
  }

  /* ---------- Renderer ---------- */
  const canvas = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    alpha: true,
    powerPreference: 'high-performance',
    preserveDrawingBuffer: true // small perf cost; lets host page snapshot the canvas for hero preview/OG capture
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.shadowMap.enabled = false;
  renderer.setClearColor(0x000000, 0);
  const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();

  /* ---------- Scene + Camera ---------- */
  // Mobile pulls the resting camera further back so more of the orbit
  // of fruit "planets" fits in a narrow viewport. Only the idle stage
  // (p0) is affected — once scroll kicks the camera into the bird's-eye
  // lift, the later keyframes take over.
  const IS_MOBILE = window.matchMedia('(max-width: 767px)').matches;
  const IDLE_CAM_Z = IS_MOBILE ? 19.0 : 13.0;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0.7, IDLE_CAM_Z);
  camera.lookAt(0, 0, 0);

  // Persistent off-axis tilt so the shake always reads at the reference
  // angle — top leans slightly left, body rolled a touch forward.
  const CUP_BASE_TILT_Z = 0.11;   // radians, top leans left
  const CUP_BASE_TILT_X = 0.045;  // radians, slight forward lean
  const CUP_SCALE       = 1.1;    // 30% bigger than original 0.85

  /* ---------- Studio HDRI env map (Poly Haven studio_small_09, CC0) ----------
   *
   * A real 32-bit HDR image unlocks the difference between "plastic toy"
   * and "product photography." The HDRI carries values well above 1.0 for
   * the studio softboxes, which is what makes the lid and straw bloom
   * with a photographic elongated highlight as the cup rotates — no
   * gradient canvas can fake that.
   *
   * PMREMGenerator converts the equirectangular HDR into the pre-filtered
   * mipmap cube that MeshStandardMaterial reads for its IBL. While the
   * HDR decodes we fall back to a soft studio gradient so the cup never
   * renders against a black or un-lit environment.
   */
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();

  function makeFallbackEnvTexture() {
    const size = 256;
    const c = document.createElement('canvas');
    c.width = size * 2; c.height = size;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, size);
    g.addColorStop(0.00, '#ffffff');
    g.addColorStop(0.45, '#fff6fb');
    g.addColorStop(0.70, '#fbeaf4');
    g.addColorStop(1.00, '#e9d3e2');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, size * 2, size);
    const tex = new THREE.CanvasTexture(c);
    tex.mapping = THREE.EquirectangularReflectionMapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = MAX_ANISO;
    return tex;
  }

  const fallbackEnv = makeFallbackEnvTexture();
  scene.environment = pmrem.fromEquirectangular(fallbackEnv).texture;
  fallbackEnv.dispose();

  new RGBELoader().load('/assets/studio.hdr', (hdr) => {
    hdr.mapping = THREE.EquirectangularReflectionMapping;
    const envMap = pmrem.fromEquirectangular(hdr).texture;
    if (scene.environment) scene.environment.dispose();
    scene.environment = envMap;
    hdr.dispose();
    pmrem.dispose();
  }, undefined, (err) => {
    console.warn('[chonk-hero] studio HDRI failed to load, keeping fallback env', err);
  });

  /* ---------- Studio lighting (softbox key + directional fills) ----------
   *
   * The HDRI handles ambient wrap and micro-reflections. Lights here are
   * scene-level direction cues:
   *   - keyLight: a physical RectAreaLight that reads as a 4×6 softbox,
   *     producing the elongated vertical highlight that sells "studio
   *     product shot" on every rotation of the lid and straw.
   *   - fill / back / bounce: small DirectionalLights, kept as-is because
   *     RectAreaLights can't cast shadow maps (we use a baked contact
   *     shadow for the floor plane instead).
   */
  RectAreaLightUniformsLib.init();

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.22);
  scene.add(ambientLight);
  const AMBIENT_BASE = ambientLight.intensity;

  const keyLight = new THREE.RectAreaLight(0xfff6ec, 8.5, 4, 6);
  keyLight.position.set(3.5, 4.0, 4.5);
  keyLight.lookAt(0, 0, 0);
  scene.add(keyLight);
  const KEY_BASE = keyLight.intensity;

  const fillLight = new THREE.DirectionalLight(0xeaf0ff, 0.38);
  fillLight.position.set(-4, 3, 3);
  scene.add(fillLight);
  const FILL_BASE = fillLight.intensity;

  // Soft backlight to separate the cup from the backdrop
  const backLight = new THREE.DirectionalLight(0xffffff, 0.30);
  backLight.position.set(-1, 4, -4);
  scene.add(backLight);
  const BACK_BASE = backLight.intensity;

  // Subtle warm bounce from below — mimics light reflecting off the surface
  const bounce = new THREE.DirectionalLight(0xfff0e0, 0.18);
  bounce.position.set(0, -3, 2);
  scene.add(bounce);
  const BOUNCE_BASE = bounce.intensity;

  /* ---------- Logo canvas texture ----------
   * Builds a 2048x2048 texture that wraps the full 360° of the cup body.
   * Base fill is Chonk pink with subtle paper grain; the real brand logo
   * (logo-on-pink.png) is composited on the "front" 42% of the wrap so
   * that at rest it sits facing camera.
   *
   * Rendering is deferred until the logo image decodes; until then the
   * cup ships with the base-pink paper so the scene never blocks.
   */
  function makeLogoTexture(logoImg) {
    const W = 2048, H = 2048;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');

    // Base pink — a balanced bubblegum that survives studio lighting.
    // The brand's hero #ffd8f3 washes to near-white under the 3-point
    // rig, so we use a more saturated shake-pink here. Because the logo
    // is drawn from a transparent PNG (no baked-in plaque background),
    // the cup body reads as one unbroken colour all the way around.
    ctx.fillStyle = '#d46894';
    ctx.fillRect(0, 0, W, H);

    // Paper grain speckles — subtle lighter/darker flecks.
    for (let i = 0; i < 14000; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      ctx.fillStyle = Math.random() > 0.5
        ? 'rgba(248,185,208,0.07)'
        : 'rgba(214,140,170,0.06)';
      ctx.fillRect(x, y, 1, 1);
    }
    for (let i = 0; i < 600; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const r = 0.8 + Math.random() * 1.8;
      ctx.fillStyle = Math.random() > 0.5
        ? 'rgba(255,200,220,0.10)'
        : 'rgba(198,126,158,0.08)';
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Brand logo (transparent PNG — just the ink, no background plaque).
    //
    // Three.js LatheGeometry (r128) emits vertices at
    //   x =  points[i].x * sin(φ),   z = points[i].x * cos(φ)
    // so φ=0 lands on +z (toward the camera). That makes u=0 (and the
    // identical u=1) the front-facing point of the cup at rest.
    //
    // The logo is drawn 2× its previous size (W*0.84 wide) and centred
    // on u=0. Since that straddles the u=0/u=1 seam, we draw it twice —
    // once anchored so its right half lands on the left edge of the
    // canvas, and once anchored so its left half lands on the right
    // edge. The two halves reunite at the wrap, putting the mark's
    // centre squarely on the cup's forward face.
    const srcW = logoImg && (logoImg.naturalWidth || logoImg.width);
    const srcH = logoImg && (logoImg.naturalHeight || logoImg.height);
    const logoReady = logoImg && srcW && srcH &&
      (logoImg instanceof HTMLCanvasElement || logoImg.complete);
    if (logoReady) {
      // Full brand mark (chonk + splash) — wider than the old wordmark,
      // so bump target width so the "chonk" glyphs keep their strong
      // front-facing weight on the cup body.
      const targetWidth = Math.round(W * 0.76);
      const aspect = srcH / srcW;
      const targetHeight = Math.round(targetWidth * aspect);
      const dx1 = Math.round(-targetWidth / 2);
      const dx2 = Math.round(W - targetWidth / 2);
      const dy  = Math.round(H * 0.42 - targetHeight / 2);
      ctx.drawImage(logoImg, dx1, dy, targetWidth, targetHeight);
      ctx.drawImage(logoImg, dx2, dy, targetWidth, targetHeight);
    }

    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = MAX_ANISO;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = true;
    tex.needsUpdate = true;
    return tex;
  }

  // Use the full brand mark (chonk!! with the splash) from the pink-bg
  // asset; strip the background at load time via colour-keying so only
  // the black ink remains, then use the resulting canvas as if it were
  // a transparent-bg image when baking the cup texture.
  const logoImg = new Image();
  logoImg.crossOrigin = 'anonymous';
  let logoTexture = makeLogoTexture(null);
  logoImg.onload = () => {
    const stripped = document.createElement('canvas');
    stripped.width  = logoImg.naturalWidth;
    stripped.height = logoImg.naturalHeight;
    const sctx = stripped.getContext('2d');
    sctx.drawImage(logoImg, 0, 0);
    const d = sctx.getImageData(0, 0, stripped.width, stripped.height);
    // The asset background is a uniform light pink (~#fdd6ef). Key out
    // anything in that tonal range; the black mark stays.
    for (let i = 0; i < d.data.length; i += 4) {
      const r = d.data[i], g = d.data[i + 1], b = d.data[i + 2];
      if (r > 230 && g > 180 && b > 210) d.data[i + 3] = 0;
    }
    sctx.putImageData(d, 0, 0);
    logoTexture = makeLogoTexture(stripped);
    if (cupMaterial) {
      cupMaterial.map = logoTexture;
      cupMaterial.needsUpdate = true;
    }
  };
  logoImg.onerror = () => {
    console.warn('[chonk-hero-lab] full-brand logo failed to load, showing paper only');
  };
  logoImg.src = 'images/logo-pink-bg.png';

  /* ---------- Lid paper texture — opaque white with subtle grain ---------- */
  //
  // A real snap-on cup lid is moulded paper/pulp — matte, opaque, with
  // faint fibre speckle. We bake a small canvas texture so the lid reads
  // as paper, not plastic.
  function makeLidPaperTexture() {
    const W = 512, H = 512;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#fdfcf9';
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 4000; i++) {
      ctx.fillStyle = Math.random() > 0.5
        ? 'rgba(220,215,208,0.18)'
        : 'rgba(255,255,255,0.12)';
      ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
    }
    for (let i = 0; i < 260; i++) {
      const r = 0.6 + Math.random() * 1.4;
      ctx.fillStyle = 'rgba(200,194,186,0.10)';
      ctx.beginPath();
      ctx.arc(Math.random() * W, Math.random() * H, r, 0, Math.PI * 2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = MAX_ANISO;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = true;
    return tex;
  }
  const lidPaperTexture = makeLidPaperTexture();

  /* ---------- Contact shadow (baked, transparent plane) ----------
   *
   * A soft elliptical shadow under the cup is the single cheapest thing
   * you can do to stop the object from reading as "floating CGI." It
   * costs zero at runtime (one transparent plane, no shadow map), and
   * sells the scene as a studio surface instead of a void.
   */
  function makeContactShadowTexture() {
    const size = 512;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const cx = size / 2;
    const cy = size / 2;
    // Elliptical radial gradient — wider than tall so the shadow sits
    // naturally under the cup's circular base.
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1.0, 0.58); // squash vertically in texture space
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.44);
    g.addColorStop(0.00, 'rgba(12, 10, 14, 0.92)');
    g.addColorStop(0.35, 'rgba(12, 10, 14, 0.55)');
    g.addColorStop(0.65, 'rgba(12, 10, 14, 0.18)');
    g.addColorStop(1.00, 'rgba(12, 10, 14, 0.00)');
    ctx.fillStyle = g;
    ctx.fillRect(-size, -size, size * 2, size * 2);
    ctx.restore();
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = MAX_ANISO;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = true;
    return tex;
  }
  const contactShadowTexture = makeContactShadowTexture();

  /* ---------- Cup group ---------- */
  const cupGroup = new THREE.Group();
  scene.add(cupGroup);

  /* ---------- Main cup body: tapered lathe + vertical ribs ---------- */
  //
  // Profile (radius, height), bottom → top. Reference cup is tall (roughly
  // 2.2:1 h:w). Very gentle taper so the body reads straight-sided at a
  // glance but narrows visibly at the base.
  const profile = [
    new THREE.Vector2(0.70, -1.55),
    new THREE.Vector2(0.72, -1.48),
    new THREE.Vector2(0.745, -1.38),
    new THREE.Vector2(0.78, -1.15),
    new THREE.Vector2(0.82, -0.80),
    new THREE.Vector2(0.86, -0.30),
    new THREE.Vector2(0.905, 0.25),
    new THREE.Vector2(0.945, 0.75),
    new THREE.Vector2(0.975, 1.15),
    new THREE.Vector2(0.99,  1.32),
    new THREE.Vector2(1.00,  1.38)
  ];
  const RADIAL_SEGMENTS = 384; // dense enough for clean ribs at ~52 cycles
  const cupGeometry = new THREE.LatheGeometry(profile, RADIAL_SEGMENTS);

  // Vertical rib displacement — radial offset driven purely by theta.
  // Top ~4% and bottom ~7% of height are smoothly faded out so the lip
  // and base ring remain clean (matches the reference).
  {
    const yMin = -1.55, yMax = 1.38;
    const span = yMax - yMin;
    const bottomCutoff = yMin + span * 0.07;
    const topCutoff    = yMax - span * 0.04;
    const fadeBand     = span * 0.035;
    const ribs = 54;          // rib count around the circumference
    const ribDepth = 0.024;   // outward-only amplitude

    const pos = cupGeometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const y = pos.getY(i);
      const z = pos.getZ(i);
      const r = Math.sqrt(x * x + z * z);
      if (r < 1e-6) continue;
      const angle = Math.atan2(z, x);

      // Height gate with smoothstep falloff
      let gate = 1;
      if (y < bottomCutoff) gate = 0;
      else if (y < bottomCutoff + fadeBand) gate = (y - bottomCutoff) / fadeBand;
      else if (y > topCutoff) gate = 0;
      else if (y > topCutoff - fadeBand) gate = (topCutoff - y) / fadeBand;
      gate = clamp(gate, 0, 1);
      gate = gate * gate * (3 - 2 * gate);

      // Outward-only rib profile (fluted, never concave).
      const raw = 0.5 - 0.5 * Math.cos(angle * ribs);
      const d = raw * ribDepth * gate;

      const nx = x / r, nz = z / r;
      pos.setX(i, x + nx * d);
      pos.setZ(i, z + nz * d);
    }
    pos.needsUpdate = true;
    cupGeometry.computeVertexNormals();
  }

  const cupMaterial = new THREE.MeshStandardMaterial({
    map: logoTexture,
    roughness: 0.82,          // matte ribbed paper
    metalness: 0.0,
    envMapIntensity: 0.85     // real HDRI — let the cup catch the room
  });
  const cupMesh = new THREE.Mesh(cupGeometry, cupMaterial);
  cupGroup.add(cupMesh);

  /* ---------- Bottom white base ring (smooth, un-ribbed) ---------- */
  const baseRingGeom = new THREE.CylinderGeometry(0.715, 0.695, 0.09, 96);
  const baseRingMat  = new THREE.MeshStandardMaterial({
    color: 0xf6f4f1,
    roughness: 0.40,
    metalness: 0.0,
    envMapIntensity: 0.9
  });
  const baseRing = new THREE.Mesh(baseRingGeom, baseRingMat);
  baseRing.position.y = -1.50;
  cupGroup.add(baseRing);

  /* ---------- Lid dome (custom shallow lathe, hugs the cup top) ---------- */
  //
  // Lathe profile of a very shallow cap. Base rim at (r=1.045, y=1.38)
  // sits just above the cup mouth; apex at (0, 1.54). Gives a flat-ish
  // dome consistent with a real snap-on lid.
  const lidProfile = [
    new THREE.Vector2(1.045, 1.38),
    new THREE.Vector2(1.035, 1.40),
    new THREE.Vector2(1.005, 1.43),
    new THREE.Vector2(0.94,  1.465),
    new THREE.Vector2(0.84,  1.495),
    new THREE.Vector2(0.70,  1.515),
    new THREE.Vector2(0.52,  1.530),
    new THREE.Vector2(0.32,  1.540),
    new THREE.Vector2(0.14,  1.544),
    new THREE.Vector2(0.0,   1.545)
  ];
  const lidDomeGeom = new THREE.LatheGeometry(lidProfile, 128);

  // Snap-on lid: real takeaway lids are injection-moulded polypropylene
  // — white, opaque, with a soft plastic sheen. The lidPaperTexture still
  // provides a faint fibre grain that reads as moulding micro-texture
  // under strong specular, but roughness is dropped hard to 0.32 so the
  // softbox highlight reads as plastic, not paper.
  const lidMat = new THREE.MeshStandardMaterial({
    map: lidPaperTexture,
    color: 0xf2f0ec,
    roughness: 0.32,
    metalness: 0.0,
    envMapIntensity: 1.05,
    side: THREE.DoubleSide
  });

  const lidDome = new THREE.Mesh(lidDomeGeom, lidMat);
  cupGroup.add(lidDome);

  /* ---------- Lid flared skirt (overhangs cup mouth) ---------- */
  const lidSkirtGeom = new THREE.CylinderGeometry(1.045, 1.015, 0.075, 96, 1, true);
  const lidSkirt = new THREE.Mesh(lidSkirtGeom, lidMat);
  lidSkirt.position.y = 1.345;
  cupGroup.add(lidSkirt);

  /* ---------- Lid seam (subtle darker pink ring where lid meets cup) ---------- */
  const seamGeom = new THREE.TorusGeometry(1.02, 0.012, 12, 160);
  const seamMat  = new THREE.MeshStandardMaterial({
    color: 0xd48aa8,
    roughness: 0.7,
    metalness: 0.0
  });
  const seam = new THREE.Mesh(seamGeom, seamMat);
  seam.rotation.x = Math.PI / 2;
  seam.position.y = 1.315;
  cupGroup.add(seam);

  /* ---------- Straw ---------- */
  //
  // In the reference the straw is nearly vertical — a very slight outward
  // lean. We parent the straw under a pivot so its base stays anchored
  // at the lid hole while the tilt rotates the cylinder in place.
  // Lab variant: straw is slightly wider and perfectly vertical so the
  // scroll-driven camera can descend straight down through it without
  // clipping the sidewall. The lean used by the live hero is intentionally
  // removed here — the dive-down beat reads best when the straw aligns
  // with the camera's descent axis.
  const strawRadius = 0.072;
  const strawHeight = 1.25;
  const strawGeom = new THREE.CylinderGeometry(strawRadius, strawRadius, strawHeight, 64, 1, true);
  const strawMat = new THREE.MeshStandardMaterial({
    color: 0xf5f3f0,
    roughness: 0.28,
    metalness: 0.0,
    envMapIntensity: 0.9,
    side: THREE.FrontSide
  });
  const strawMesh = new THREE.Mesh(strawGeom, strawMat);
  strawMesh.position.y = strawHeight / 2;

  // The top cap is hidden for the lab: we want the straw to read as an
  // open opening so the dark inner tube shows through from above as a
  // tunnel entrance.
  const strawCapGeom = new THREE.CircleGeometry(strawRadius, 64);
  const strawCap = new THREE.Mesh(strawCapGeom, strawMat);
  strawCap.rotation.x = -Math.PI / 2;
  strawCap.position.y = strawHeight;
  strawCap.visible = false;

  const strawPivot = new THREE.Group();
  strawPivot.add(strawMesh);
  strawPivot.add(strawCap);
  strawPivot.rotation.z = 0;
  strawPivot.rotation.x = 0;
  strawPivot.position.set(0.22, 1.50, 0.03);
  cupGroup.add(strawPivot);

  /* ---------- Dark inner tube (the tunnel) ----------
   *
   * A second, slightly narrower cylinder rendered only on its BackSide
   * (the inward-facing surface) with an unlit near-black material. The
   * outer cream straw wall occludes it from any external angle, so it
   * only becomes visible when the camera looks straight down the open
   * top or threads inside the tube. Parented to strawPivot so it inherits
   * every cup transform (persistent forward + left tilt, bob, rotation-
   * lock) and stays perfectly aligned inside the white straw.
   */
  const INNER_TUBE_RADIUS = strawRadius * 0.93;
  const INNER_TUBE_TOP_LOCAL = strawHeight;     // flush with the top of the outer straw
  const INNER_TUBE_BOTTOM_LOCAL = -0.74;        // extends below pivot origin into the cup interior
  const INNER_TUBE_HEIGHT_LOCAL = INNER_TUBE_TOP_LOCAL - INNER_TUBE_BOTTOM_LOCAL;

  const innerTubeMat = new THREE.MeshBasicMaterial({
    color: 0x040306,
    side: THREE.BackSide,
    toneMapped: false,
    transparent: true,
    opacity: 1
  });
  const innerTubeGeom = new THREE.CylinderGeometry(
    INNER_TUBE_RADIUS, INNER_TUBE_RADIUS, INNER_TUBE_HEIGHT_LOCAL, 48, 1, true
  );
  const innerTube = new THREE.Mesh(innerTubeGeom, innerTubeMat);
  innerTube.position.y = (INNER_TUBE_TOP_LOCAL + INNER_TUBE_BOTTOM_LOCAL) / 2;
  strawPivot.add(innerTube);

  // Dark end-disc at the base of the tunnel so looking straight down
  // from above shows a dark well, not a peek at the cup base ring.
  const innerCapMat = new THREE.MeshBasicMaterial({
    color: 0x040306,
    side: THREE.DoubleSide,
    toneMapped: false,
    transparent: true,
    opacity: 1
  });
  const innerCapGeom = new THREE.CircleGeometry(INNER_TUBE_RADIUS * 1.02, 48);
  const innerCap = new THREE.Mesh(innerCapGeom, innerCapMat);
  innerCap.rotation.x = -Math.PI / 2;
  innerCap.position.y = INNER_TUBE_BOTTOM_LOCAL;
  strawPivot.add(innerCap);

  // A thin dark ring around the straw hole — the shadow where straw
  // pokes through the lid membrane.
  const strawHoleGeom = new THREE.TorusGeometry(strawRadius + 0.008, 0.0035, 8, 48);
  const strawHoleMat = new THREE.MeshStandardMaterial({
    color: 0x6b5c62,
    roughness: 0.7,
    metalness: 0.0,
    transparent: true,
    opacity: 0.6
  });
  const strawHole = new THREE.Mesh(strawHoleGeom, strawHoleMat);
  strawHole.rotation.x = Math.PI / 2;
  strawHole.position.set(0.22, 1.505, 0.03);
  cupGroup.add(strawHole);

  // List of "outer cup" meshes that should fade out as the camera enters
  // the straw — but the inner tube and cap (children of strawPivot, added
  // above) are NOT in this list, so the dark tunnel stays solid even
  // after the cup itself has visually disappeared.
  const outerCupMeshes = [cupMesh, baseRing, lidDome, lidSkirt, seam, strawMesh, strawHole];

  /* ---------- Exploded-view "topAssembly" ----------
   *
   * Group the lid parts (dome + skirt + seam + the straw-hole shadow
   * ring) into a single Group so they can lift off the cup body as a
   * unit during the blueprint exploded-view beat. The STRAW stays
   * parented to cupGroup — physically accurate (lid has a hole, straw
   * stays planted in the drink) and necessary so the tunnel descent
   * in stage 3 hits the straw at its original world position.
   */
  const topAssembly = new THREE.Group();
  cupGroup.add(topAssembly);
  topAssembly.add(lidDome);
  topAssembly.add(lidSkirt);
  topAssembly.add(seam);
  topAssembly.add(strawHole);

  /* ---------- Chonky liquid inside the cup ----------
   *
   * A thick, warm cream lathe that fills the cup body to just below
   * the rim. Hidden until the lid lifts — the "reveal" of the scroll.
   * Top surface gets low-frequency vertex displacement so it reads
   * as a viscous protein shake with a meniscus, not a flat disc.
   * Stays in cupGroup so it doesn't lift with the lid.
   */
  const LIQUID_TOP = 1.15;
  const LIQUID_BOTTOM = -1.48;
  const liquidProfile = [
    new THREE.Vector2(0,    LIQUID_BOTTOM),
    new THREE.Vector2(0.68, LIQUID_BOTTOM),
    new THREE.Vector2(0.70, -1.40),
    new THREE.Vector2(0.74, -1.10),
    new THREE.Vector2(0.78, -0.70),
    new THREE.Vector2(0.83, -0.25),
    new THREE.Vector2(0.87, 0.25),
    new THREE.Vector2(0.91, 0.75),
    new THREE.Vector2(0.94, LIQUID_TOP - 0.05),
    new THREE.Vector2(0.94, LIQUID_TOP),
    new THREE.Vector2(0.65, LIQUID_TOP + 0.02),
    new THREE.Vector2(0,    LIQUID_TOP + 0.015)
  ];
  const liquidGeom = new THREE.LatheGeometry(liquidProfile, 96);
  // Chonky meniscus: displace the top surface with low-frequency noise
  // so the liquid reads as thick and slightly uneven, not liquid-flat.
  (function chonkifyTop() {
    const pos = liquidGeom.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i);
      if (y < LIQUID_TOP - 0.03) continue;
      const x = pos.getX(i);
      const z = pos.getZ(i);
      const theta = Math.atan2(z, x);
      const r = Math.sqrt(x * x + z * z);
      const bump = 0.022 * Math.sin(theta * 3)
                 + 0.012 * Math.sin(theta * 7 + 1.1)
                 + 0.008 * Math.sin(theta * 13 + 2.3);
      // Taper bumps toward the centre so the middle stays smooth.
      const centerFade = Math.min(1, r / 0.5);
      pos.setY(i, y + bump * centerFade);
    }
    pos.needsUpdate = true;
    liquidGeom.computeVertexNormals();
  })();
  const liquidMat = new THREE.MeshStandardMaterial({
    color: 0xead7b8,
    roughness: 0.58,
    metalness: 0.0,
    envMapIntensity: 1.0,
    transparent: true,
    opacity: 0
  });
  const liquidMesh = new THREE.Mesh(liquidGeom, liquidMat);
  liquidMesh.renderOrder = 0;
  cupGroup.add(liquidMesh);

  /* ---------- Fade-to-blueprint overlay ----------
   *
   * A schematic line-drawing of the cup that cross-fades in early in
   * the scroll (0.08 → 0.22), so the rendered product gives way to its
   * engineering. Built from THREE.EdgesGeometry so we only get the
   * structural / silhouette edges — clean blueprint lines, not the
   * full triangulated mesh noise. Parented to the same transform as
   * its source mesh (cupGroup / strawPivot) so it inherits rotation,
   * tilt, rotation-lock, and the upright-lerp automatically.
   *
   * The STRAW is intentionally excluded from this crossfade — it stays
   * fully rendered through the blueprint phase as the visual anchor
   * ("the engineering of the cup, with a real straw still poking out"),
   * and fades out normally when we drop into the tunnel in stage 3.
   *
   * Materials are flipped to transparent:true so their opacity can drop
   * to 0 while the line material opacity rises to 1. The crossover is
   * controlled each frame in animate() via `blueprintBlend`.
   */
  const BLUEPRINT_COLOR = 0xffd8f3;
  const wireframeMat = new THREE.LineBasicMaterial({
    color: BLUEPRINT_COLOR,
    transparent: true,
    opacity: 0,
    toneMapped: false,
    depthTest: false,
    depthWrite: false,
    blending: THREE.AdditiveBlending  // luminous pen-stroke feel
  });
  const wireframes = [];
  function addBlueprintWireframe(sourceMesh, parent, thresholdDeg) {
    const edges = new THREE.EdgesGeometry(sourceMesh.geometry, thresholdDeg ?? 15);
    const wire = new THREE.LineSegments(edges, wireframeMat);
    wire.position.copy(sourceMesh.position);
    wire.rotation.copy(sourceMesh.rotation);
    wire.scale.copy(sourceMesh.scale);
    wire.renderOrder = 100;
    parent.add(wire);
    wireframes.push(wire);
  }
  addBlueprintWireframe(cupMesh,  cupGroup,     12);
  addBlueprintWireframe(baseRing, cupGroup,     20);
  addBlueprintWireframe(lidDome,  topAssembly,  18);  // lifts with the lid
  addBlueprintWireframe(lidSkirt, topAssembly,  20);  // lifts with the lid

  /* ---------- Rich cylindrical wireframe for the straw ----------
   *
   * EdgesGeometry on a smooth open cylinder produces only two rings
   * (top + bottom) — not enough to read as "this is a tube" in a
   * schematic. Build a proper technical-drawing cylinder: two end
   * rings, three intermediate latitude rings for segmentation, and
   * ten vertical meridians so the eye locks onto the tube shape
   * regardless of rotation.
   */
  (function addStrawBlueprint() {
    const SEGMENTS = 48;
    const MERIDIANS = 10;
    const LATITUDES = 3;  // intermediate rings between top + bottom
    const positions = [];

    function pushRing(y) {
      for (let i = 0; i < SEGMENTS; i++) {
        const a0 = (i     / SEGMENTS) * Math.PI * 2;
        const a1 = ((i+1) / SEGMENTS) * Math.PI * 2;
        positions.push(
          Math.cos(a0) * strawRadius, y, Math.sin(a0) * strawRadius,
          Math.cos(a1) * strawRadius, y, Math.sin(a1) * strawRadius
        );
      }
    }
    // End rings (bottom + top of straw tube)
    pushRing(0);
    pushRing(strawHeight);
    // Intermediate latitudes
    for (let lat = 1; lat <= LATITUDES; lat++) {
      pushRing((lat / (LATITUDES + 1)) * strawHeight);
    }
    // Meridian lines (vertical generators)
    for (let m = 0; m < MERIDIANS; m++) {
      const a = (m / MERIDIANS) * Math.PI * 2;
      const x = Math.cos(a) * strawRadius;
      const z = Math.sin(a) * strawRadius;
      positions.push(x, 0, z,  x, strawHeight, z);
    }
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const strawWire = new THREE.LineSegments(geom, wireframeMat);
    strawWire.renderOrder = 100;
    strawPivot.add(strawWire);
    wireframes.push(strawWire);
  })();

  // Construction crosshair marks at key anatomical points on the cup.
  // Classic blueprint ornament: tiny `+` ticks that say "this is an
  // engineering drawing, not a render." Share the same material so
  // they fade in/out with the wireframes.
  // Construction marks are split between two parents: cup-body marks
  // (rim, base, straw top) stay in cupGroup; the lid-apex mark lives
  // inside topAssembly so it lifts with the lid during the exploded-
  // view beat.
  (function addConstructionMarks() {
    const CS = 0.065;
    function addMarks(anchors, parent) {
      if (!anchors.length) return;
      const positions = [];
      for (const [x, y, z] of anchors) {
        positions.push(x - CS, y, z,  x + CS, y, z);
        positions.push(x, y - CS, z,  x, y + CS, z);
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      const marks = new THREE.LineSegments(geom, wireframeMat);
      marks.renderOrder = 101;
      parent.add(marks);
      wireframes.push(marks);
    }
    addMarks(
      [[0, 1.38, 0],  [0, -1.55, 0],  [0.22, 2.75, 0.03]],
      cupGroup
    );
    addMarks(
      [[0, 1.54, 0]],
      topAssembly
    );
  })();

  // Blueprint ground grid — a faint horizontal grid at the implied
  // floor plane, sits below the cup and appears as the camera rises
  // to bird's-eye. Gives the blueprint a "plan view" feel without
  // any extra UI chrome.
  function makeBlueprintGridTexture() {
    const size = 1024;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, size, size);
    // Fine grid: 40 divisions
    ctx.strokeStyle = 'rgba(255, 216, 243, 0.18)';
    ctx.lineWidth = 1;
    const fine = size / 40;
    for (let i = 1; i < 40; i++) {
      const p = i * fine;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();
    }
    // Coarse grid: every 4 fine cells
    ctx.strokeStyle = 'rgba(255, 216, 243, 0.45)';
    ctx.lineWidth = 1.6;
    const coarse = size / 10;
    for (let i = 1; i < 10; i++) {
      const p = i * coarse;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, size); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(size, p); ctx.stroke();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = MAX_ANISO;
    return tex;
  }
  const blueprintGridTex = makeBlueprintGridTexture();
  const blueprintGridMat = new THREE.MeshBasicMaterial({
    map: blueprintGridTex,
    transparent: true,
    opacity: 0,
    depthWrite: false,
    toneMapped: false,
    blending: THREE.AdditiveBlending
  });
  const blueprintGrid = new THREE.Mesh(new THREE.PlaneGeometry(18, 18), blueprintGridMat);
  blueprintGrid.rotation.x = -Math.PI / 2;
  blueprintGrid.position.y = -1.40;
  blueprintGrid.renderOrder = -1;
  scene.add(blueprintGrid);

  // Vertical companion grid behind the cup (elevation view). Visible
  // during the establishing + rise stages, invisible when the camera
  // rotates to pure top-down (rotation makes it edge-on anyway) and
  // fades out when we enter the tunnel.
  const blueprintWallMat = new THREE.MeshBasicMaterial({
    map: blueprintGridTex,
    transparent: true,
    opacity: 0,
    depthWrite: false,
    toneMapped: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide
  });
  const blueprintWall = new THREE.Mesh(new THREE.PlaneGeometry(18, 12), blueprintWallMat);
  blueprintWall.position.set(0, 1.2, -3.4);
  blueprintWall.renderOrder = -1;
  scene.add(blueprintWall);

  // (Opening storm + droplet animation removed — intro is now a
  // staggered "rise from floor" for the shake and each orbiter,
  // handled later in the animate loop.)
  const BASE_EXPOSURE = renderer.toneMappingExposure;

  /* ---------- Chonk force field ----------
   *
   * Close-orbit aura of additive pink motes around the shake — an
   * igloo.inc-style "this object has a field" cue. Each particle
   * orbits the cup axis at its own radius/height/speed; gentle
   * vertical wobble prevents the band from feeling banded. Fades
   * with the cup (stays through orbits, attenuates during blueprint
   * transition, gone by tunnel entry).
   */
  const FORCE_COUNT = 130;
  const forceGeom = new THREE.BufferGeometry();
  const forcePos = new Float32Array(FORCE_COUNT * 3);
  const forceRadius = new Float32Array(FORCE_COUNT);
  const forceHeight = new Float32Array(FORCE_COUNT);
  const forcePhase  = new Float32Array(FORCE_COUNT);
  const forceSpeed  = new Float32Array(FORCE_COUNT);
  const forceWobble = new Float32Array(FORCE_COUNT);
  for (let i = 0; i < FORCE_COUNT; i++) {
    forceRadius[i] = 1.18 + Math.random() * 0.55;   // hugs just outside the cup
    forceHeight[i] = -1.5 + Math.random() * 3.2;    // cup-height range
    forcePhase[i]  = Math.random() * Math.PI * 2;
    forceSpeed[i]  = 0.55 + Math.random() * 1.4;
    forceWobble[i] = 0.08 + Math.random() * 0.12;
  }
  forceGeom.setAttribute('position', new THREE.BufferAttribute(forcePos, 3));
  const forceMat = new THREE.PointsMaterial({
    color: 0xffd8f3,
    size: 0.022,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false
  });
  const forcePoints = new THREE.Points(forceGeom, forceMat);
  forcePoints.visible = false;
  forcePoints.renderOrder = 55;
  scene.add(forcePoints);

  /* ---------- Distant starfield (very subtle universe backdrop) ---------- */
  const STAR_COUNT = 240;
  const starGeom = new THREE.BufferGeometry();
  const starPos = new Float32Array(STAR_COUNT * 3);
  const starSize = new Float32Array(STAR_COUNT);
  for (let i = 0; i < STAR_COUNT; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 10 + Math.random() * 12;
    starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i*3+2] = r * Math.cos(phi);
    starSize[i] = 0.004 + Math.random() * 0.014;
  }
  starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({
    color: 0xfde4f5,
    size: 0.012,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.32,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false
  });
  const stars = new THREE.Points(starGeom, starMat);
  stars.renderOrder = -25;
  scene.add(stars);

  /* ---------- Subtle orbit guide rings (solar-system cue) ----------
   * Built AFTER orbiters are defined below. We just allocate the array
   * here and push to it once the solar-system composition runs.
   */
  const orbitRingGroup = new THREE.Group();
  orbitRingGroup.renderOrder = -10;
  scene.add(orbitRingGroup);
  const orbitRingMat = new THREE.LineBasicMaterial({
    color: 0xffd8f3,
    transparent: true,
    opacity: 0.09,
    depthWrite: false,
    toneMapped: false,
    blending: THREE.AdditiveBlending
  });

  /* ---------- Blueprint ripple dispersion ----------
   *
   * Terminal-industries-style transition: as the rendered cup fades
   * to blueprint, a burst of pink motes disperses outward from a
   * single point on the cup — as if the blueprint effect is being
   * propagated by the particles themselves. Uses the same additive
   * pink material language as the wireframe so it reads as one
   * coherent stylistic system.
   */
  const RIPPLE_COUNT = 240;
  const rippleGeom = new THREE.BufferGeometry();
  const ripplePos = new Float32Array(RIPPLE_COUNT * 3);
  const rippleDirX = new Float32Array(RIPPLE_COUNT);
  const rippleDirY = new Float32Array(RIPPLE_COUNT);
  const rippleDirZ = new Float32Array(RIPPLE_COUNT);
  const rippleLife = new Float32Array(RIPPLE_COUNT);
  const rippleSpeed = new Float32Array(RIPPLE_COUNT);
  for (let i = 0; i < RIPPLE_COUNT; i++) {
    // Uniform-ish sphere sampling, slightly biased outward from cup.
    const u = Math.random();
    const v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    rippleDirX[i] = Math.sin(phi) * Math.cos(theta);
    rippleDirY[i] = Math.sin(phi) * Math.sin(theta);
    rippleDirZ[i] = Math.cos(phi);
    rippleLife[i] = Math.random();           // 0..1 spawn phase
    rippleSpeed[i] = 2.0 + Math.random() * 2.8;
  }
  rippleGeom.setAttribute('position', new THREE.BufferAttribute(ripplePos, 3));
  const rippleMat = new THREE.PointsMaterial({
    color: 0xffd8f3,
    size: 0.050,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false
  });
  const ripplePoints = new THREE.Points(rippleGeom, rippleMat);
  ripplePoints.visible = false;
  ripplePoints.renderOrder = 60;
  // Parent to cupGroup so the origin tracks cup rotation + tilt + upright-lerp.
  cupGroup.add(ripplePoints);
  // Ripple origin in cupGroup-local coordinates — top of the straw,
  // the visible "highest point" of the cup. Feels like the blueprint
  // transition is being emitted from the product's apex.
  const RIPPLE_ORIGIN_X = 0.22;
  const RIPPLE_ORIGIN_Y = 2.75;
  const RIPPLE_ORIGIN_Z = 0.03;

  /* ==========================================================================
   * CHONK SOLAR SYSTEM
   *
   * Each brand-appropriate fruit is a "planet" orbiting the shake on
   * its own tilted orbital plane, with its own radius + speed + phase.
   * Fruits crossfade to wireframe alongside the cup (sharing wireframeMat
   * so the blueprint transition happens as one coherent moment), then
   * spiral inward during scroll 0.35 → 0.52 — the exact window where
   * the lid has lifted off, so the fruits are sucked into the open
   * mouth of the shake and disappear into the liquid.
   * ======================================================================== */
  const fruitGroup = new THREE.Group();
  fruitGroup.visible = false;
  scene.add(fruitGroup);

  const fruitFadeMaterials = [];
  const fruitOrbits = [];
  const symbioteBodies = [];   // meshes that morph each frame via noise
  const powderBodies = [];     // Points clouds with per-frame powder drift
  const fruitDotClouds = [];   // { mat, points } per fruit — blueprint-phase dot render

  function registerFruitMaterial(mat) {
    mat.transparent = true;
    fruitFadeMaterials.push({ mat, baseOpacity: mat.opacity ?? 1 });
  }

  // Build a wireframe for the fruit's primary body mesh and parent it
  // INSIDE that body so the wire inherits every transform the fruit
  // undergoes (orbital motion, suck-in scale, axial spin).
  function attachFruitWireframe(body) {
    if (!body || !body.geometry) return;
    const edges = new THREE.EdgesGeometry(body.geometry, 18);
    const wire = new THREE.LineSegments(edges, wireframeMat);
    wire.renderOrder = 100;
    body.add(wire);
    wireframes.push(wire);
  }

  // Build a Points cloud that SHARES the body's position attribute —
  // when the body morphs (symbiote) or animates, the dot cloud follows
  // automatically without having to be resynced.
  function attachFruitDots(body) {
    if (!body || !body.geometry) return;
    const dotGeom = new THREE.BufferGeometry();
    dotGeom.setAttribute('position', body.geometry.attributes.position);
    if (body.geometry.index) dotGeom.setIndex(body.geometry.index);
    const dotMat = new THREE.PointsMaterial({
      color: 0xffd8f3,
      size: 0.028,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false
    });
    const points = new THREE.Points(dotGeom, dotMat);
    points.renderOrder = 101;
    body.add(points);
    fruitDotClouds.push({ mat: dotMat, points });
  }

  function addFruitToOrbit(root, body, params) {
    fruitGroup.add(root);
    // Fruits skip the wireframe phase — rendered fades directly to the
    // dot cloud, which is the final blueprint state before suck-in.
    attachFruitDots(body);
    const orbitRef = {
      mesh: root,
      radius:      params.radius,
      speed:       params.speed,
      phase:       params.phase ?? Math.random() * Math.PI * 2,
      inclination: params.inclination ?? 0,
      planeY:      params.planeY ?? -0.9,
      bobAmp:      params.bobAmp ?? 0.035,
      bobSpeed:    params.bobSpeed ?? (0.5 + Math.random() * 0.5),
      bobPhase:    Math.random() * Math.PI * 2,
      axialSpin:   params.axialSpin ?? 0.4,
      baseScale:   params.baseScale ?? 1,
      baseRotZ:    params.baseRotZ ?? 0,
      // Cursor-hover rebound — updated on mousemove raycast, sprung
      // back to zero each frame by the spring physics in animate.
      hoverOffX: 0, hoverOffY: 0, hoverOffZ: 0,
      hoverVelX: 0, hoverVelY: 0, hoverVelZ: 0
    };
    fruitOrbits.push(orbitRef);
    // Stamp root AND the body mesh so raycast hits either descendant
    // and still resolves back to the orbit entry via userData.
    root.traverse(n => { n.userData.orbitRef = orbitRef; });
    return orbitRef;
  }

  /* ---------- Orange (pebbled skin + vertex-color shading) ---------- */
  function buildOrange(radius) {
    const geom = new THREE.SphereGeometry(radius, 48, 36);
    const pos = geom.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
      const n1 = Math.sin(px * 22) * Math.sin(py * 22) * Math.sin(pz * 22);
      const n2 = Math.sin(px * 45) * Math.sin(pz * 45);
      const bump = 0.010 + n1 * 0.007 + n2 * 0.003;
      const inv = 1 + bump / radius;
      pos.setX(i, px * inv); pos.setY(i, py * inv); pos.setZ(i, pz * inv);
    }
    geom.computeVertexNormals();
    // Vertex colour gradient: brighter top, shaded underside, warm-red blush band
    const colors = new Float32Array(pos.count * 3);
    const cHigh = new THREE.Color(0xffa54a);
    const cMid  = new THREE.Color(0xef7a18);
    const cLow  = new THREE.Color(0xc55208);
    const cTmp  = new THREE.Color();
    for (let i = 0; i < pos.count; i++) {
      const ny = (pos.getY(i) + radius) / (2 * radius);
      if (ny > 0.5) cTmp.copy(cMid).lerp(cHigh, (ny - 0.5) * 2);
      else          cTmp.copy(cLow).lerp(cMid, ny * 2);
      colors[i*3] = cTmp.r; colors[i*3+1] = cTmp.g; colors[i*3+2] = cTmp.b;
    }
    geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.MeshStandardMaterial({
      color: 0xffffff, vertexColors: true,
      roughness: 0.93, metalness: 0.0, envMapIntensity: 0.55
    });
    registerFruitMaterial(mat);
    const body = new THREE.Mesh(geom, mat);
    // Organic asymmetry — slight non-uniform scale per axis.
    body.scale.set(1.02, 0.97, 1.04);
    // Green calyx stem at the top
    const stemGeom = new THREE.CylinderGeometry(radius * 0.055, radius * 0.10, radius * 0.18, 14);
    const stemMat = new THREE.MeshStandardMaterial({
      color: 0x5b7a2f, roughness: 0.55, metalness: 0.0
    });
    registerFruitMaterial(stemMat);
    const stem = new THREE.Mesh(stemGeom, stemMat);
    stem.position.set(0, radius * 0.94, 0);
    stem.rotation.z = 0.08;
    body.add(stem);
    return { root: body, body };
  }

  /* ---------- Mango (yellow→red blush gradient) ---------- */
  function buildMango() {
    const geom = new THREE.SphereGeometry(0.34, 48, 32);
    const pos = geom.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.setX(i, pos.getX(i) * 1.45);
      pos.setY(i, pos.getY(i) * 0.90);
      pos.setZ(i, pos.getZ(i) * 0.95);
    }
    geom.computeVertexNormals();
    // Characteristic blush along the long axis: green-yellow at stem end,
    // yellow through middle, fiery red-orange at the tip.
    const colors = new Float32Array(pos.count * 3);
    const cStem   = new THREE.Color(0xc6a730);
    const cYellow = new THREE.Color(0xf5c220);
    const cBlush  = new THREE.Color(0xe04b1a);
    const cTmp    = new THREE.Color();
    const MAX_X = 1.45 * 0.34;
    for (let i = 0; i < pos.count; i++) {
      const tx = (pos.getX(i) / MAX_X + 1) * 0.5;  // 0..1
      const blushT = smoothstep01((tx - 0.55) / 0.40);
      const stemT  = smoothstep01((0.20 - tx) / 0.18);
      cTmp.copy(cYellow).lerp(cBlush, blushT).lerp(cStem, stemT);
      // Slight speckling (asymmetric rose dots)
      const spec = (Math.sin(pos.getY(i) * 40) + Math.sin(pos.getZ(i) * 40)) * 0.02;
      cTmp.r = Math.min(1, cTmp.r + spec * 0.6);
      cTmp.g = Math.max(0, cTmp.g - spec * 0.3);
      colors[i*3] = cTmp.r; colors[i*3+1] = cTmp.g; colors[i*3+2] = cTmp.b;
    }
    geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.MeshStandardMaterial({
      color: 0xffffff, vertexColors: true,
      roughness: 0.72, metalness: 0.0, envMapIntensity: 0.60
    });
    registerFruitMaterial(mat);
    const body = new THREE.Mesh(geom, mat);
    body.scale.set(1.05, 0.96, 1.03);  // organic kidney-bulge asymmetry
    return { root: body, body };
  }

  /* ---------- Strawberry (teardrop + deep red gradient + seeds + calyx) ---------- */
  function buildStrawberry() {
    const group = new THREE.Group();
    const bodyGeom = new THREE.SphereGeometry(0.16, 44, 36);
    const pos = bodyGeom.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const py = pos.getY(i);
      const yNorm = py / 0.16;
      const taper = yNorm < 0 ? 1 - Math.abs(yNorm) * 0.55 : 1;
      pos.setX(i, pos.getX(i) * taper);
      pos.setZ(i, pos.getZ(i) * taper);
      pos.setY(i, py * 1.25);
    }
    bodyGeom.computeVertexNormals();
    // Deep-red gradient: darker at the bottom tip, brighter near the top
    const bodyColors = new Float32Array(bodyGeom.attributes.position.count * 3);
    const cBright = new THREE.Color(0xe23c49);
    const cDeep   = new THREE.Color(0x9c1524);
    const cTmp    = new THREE.Color();
    for (let i = 0; i < bodyGeom.attributes.position.count; i++) {
      const py = bodyGeom.attributes.position.getY(i);
      const t = smoothstep01((py + 0.20) / 0.40);  // bottom → top
      cTmp.copy(cDeep).lerp(cBright, t);
      bodyColors[i*3] = cTmp.r; bodyColors[i*3+1] = cTmp.g; bodyColors[i*3+2] = cTmp.b;
    }
    bodyGeom.setAttribute('color', new THREE.BufferAttribute(bodyColors, 3));
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0xffffff, vertexColors: true,
      roughness: 0.68, metalness: 0.02, envMapIntensity: 0.65
    });
    registerFruitMaterial(bodyMat);
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    group.add(body);
    // Gold seed speckles — denser for realism
    const seedMat = new THREE.MeshStandardMaterial({
      color: 0xf8e28a, roughness: 0.45, metalness: 0.15
    });
    registerFruitMaterial(seedMat);
    const seedGeom = new THREE.SphereGeometry(0.008, 8, 6);
    for (let i = 0; i < 42; i++) {
      const u = Math.random(), v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      const px = 0.16 * Math.sin(phi) * Math.cos(theta);
      const py = 0.20 * Math.cos(phi);
      const pz = 0.16 * Math.sin(phi) * Math.sin(theta);
      if (py < -0.18) continue;
      const taper = py < 0 ? 1 - Math.abs(py / 0.20) * 0.45 : 1;
      const seed = new THREE.Mesh(seedGeom, seedMat);
      seed.position.set(px * taper, py, pz * taper);
      group.add(seed);
    }
    // Calyx leaves
    const calyxGeom = new THREE.ConeGeometry(0.09, 0.08, 8);
    const calyxMat = new THREE.MeshStandardMaterial({
      color: 0x4c7a2a, roughness: 0.55, metalness: 0.0
    });
    registerFruitMaterial(calyxMat);
    for (let k = 0; k < 5; k++) {
      const leaf = new THREE.Mesh(calyxGeom, calyxMat);
      const a = (k / 5) * Math.PI * 2;
      leaf.position.set(Math.cos(a) * 0.04, 0.21, Math.sin(a) * 0.04);
      leaf.rotation.z = Math.cos(a) * 0.6;
      leaf.rotation.x = Math.sin(a) * 0.6;
      group.add(leaf);
    }
    return { root: group, body };
  }

  /* ---------- Banana (curved, tapered, with brown tips) ---------- */
  function buildBanana() {
    const geom = new THREE.SphereGeometry(0.18, 56, 28);
    const pos = geom.attributes.position;
    const MAX_X_BASE = 0.18;
    for (let i = 0; i < pos.count; i++) {
      let px = pos.getX(i) * 2.6;
      let py = pos.getY(i) * 0.45;
      let pz = pos.getZ(i) * 0.42;
      const xn = px / (MAX_X_BASE * 2.6);
      py += xn * xn * 0.18;
      const absXn = Math.abs(xn);
      const taper = 1 - absXn * absXn * 0.55;
      py *= taper; pz *= taper;
      pos.setX(i, px); pos.setY(i, py); pos.setZ(i, pz);
    }
    geom.computeVertexNormals();
    // Vertex colour: golden-yellow through the middle, browning at the tips
    const colors = new Float32Array(pos.count * 3);
    const cYellow = new THREE.Color(0xf6d348);
    const cRich   = new THREE.Color(0xe8b420);
    const cBrown  = new THREE.Color(0x6e4822);
    const cTmp    = new THREE.Color();
    const MAX_X = 0.18 * 2.6;
    for (let i = 0; i < pos.count; i++) {
      const absXn = Math.abs(pos.getX(i)) / MAX_X;
      const tipT = smoothstep01((absXn - 0.80) / 0.20);
      cTmp.copy(cYellow).lerp(cRich, 0.35).lerp(cBrown, tipT);
      // Subtle dark speckles
      const fleck = Math.sin(pos.getY(i) * 70) * Math.sin(pos.getZ(i) * 70);
      if (fleck > 0.8) cTmp.multiplyScalar(0.78);
      colors[i*3] = cTmp.r; colors[i*3+1] = cTmp.g; colors[i*3+2] = cTmp.b;
    }
    geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.MeshStandardMaterial({
      color: 0xffffff, vertexColors: true,
      roughness: 0.82, metalness: 0.0, envMapIntensity: 0.55
    });
    registerFruitMaterial(mat);
    const body = new THREE.Mesh(geom, mat);
    return { root: body, body };
  }

  /* ---------- Milk glob (Venom-style symbiote morph) ---------- */
  // Snapshot the pristine sphere positions once, then in animate we
  // displace each vertex along its surface normal by a multi-octave
  // sum of sines in 4D (3 space + time). The result is a smooth liquid
  // blob that morphs continuously — tendrils bud, recede, breathe.
  function buildMilkGlob() {
    const BASE_R = 0.26;
    const geom = new THREE.SphereGeometry(BASE_R, 56, 40);
    geom.userData.origPos = new Float32Array(geom.attributes.position.array);
    geom.userData.baseRadius = BASE_R;
    const mat = new THREE.MeshStandardMaterial({
      color: 0xfdf8ee, roughness: 0.18, metalness: 0.05, envMapIntensity: 1.25
    });
    registerFruitMaterial(mat);
    const body = new THREE.Mesh(geom, mat);
    body.userData.symbiote = true;
    body.userData.symbioteAmp = 0.185;
    body.userData.symbioteSpeed = 2.05;
    body.userData.symbioteFreqA = 3.4;
    body.userData.symbioteFreqB = 7.2;
    body.userData.symbioteFreqC = 2.0;
    body.userData.symbioteFreqD = 11.6;
    symbioteBodies.push(body);
    return { root: body, body };
  }

  /* ---------- Honey glob (symbiote morph, warm amber) ---------- */
  function buildHoneyGlob() {
    const BASE_R = 0.22;
    const geom = new THREE.SphereGeometry(BASE_R, 52, 38);
    geom.userData.origPos = new Float32Array(geom.attributes.position.array);
    geom.userData.baseRadius = BASE_R;
    const mat = new THREE.MeshStandardMaterial({
      color: 0xe69113,
      emissive: 0x7a4605,
      emissiveIntensity: 0.42,
      roughness: 0.26,
      metalness: 0.05,
      envMapIntensity: 1.2
    });
    registerFruitMaterial(mat);
    const body = new THREE.Mesh(geom, mat);
    body.userData.symbiote = true;
    body.userData.symbioteAmp = 0.160;
    body.userData.symbioteSpeed = 1.55;
    body.userData.symbioteFreqA = 2.6;
    body.userData.symbioteFreqB = 5.8;
    body.userData.symbioteFreqC = 1.6;
    body.userData.symbioteFreqD = 9.4;
    symbioteBodies.push(body);
    return { root: body, body };
  }

  /* ---------- Protein powder cloud (floating powdery particles) ---------- */
  // No more scoop — the powder itself is the orbiter. A dense ellipsoidal
  // cloud of tiny cream-coloured particles that gently drifts each frame,
  // so it feels suspended, not sculpted. Registered on the
  // `powderBodies[]` list so per-frame jitter animates it.
  function buildProteinPowder() {
    const COUNT = 240;
    const positions = new Float32Array(COUNT * 3);
    for (let i = 0; i < COUNT; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      // Cube-root density so centre is denser than the edges.
      const r = 0.32 * Math.cbrt(0.15 + Math.random() * 0.85);
      positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.82; // slightly flattened
      positions[i*3+2] = r * Math.cos(phi);
    }
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geom.userData.origPos = new Float32Array(positions);
    const mat = new THREE.PointsMaterial({
      color: 0xf6ead0,
      size: 0.050,
      sizeAttenuation: true,
      transparent: true,
      opacity: 1,
      depthWrite: false,
      toneMapped: false
    });
    registerFruitMaterial(mat);
    const body = new THREE.Points(geom, mat);
    body.userData.powder = true;
    body.userData.powderDriftAmp = 0.065;
    body.userData.powderDriftSpeed = 1.35;
    powderBodies.push(body);
    return { root: body, body };
  }

  /* ---------- Blueberry cluster (deep blue with dusty top bloom) ---------- */
  function buildBlueberryCluster() {
    const group = new THREE.Group();
    const offsets = [
      [0.00,  0.00, 0.00, 0.13],
      [0.14, -0.02, 0.06, 0.12],
      [-0.11, 0.01, 0.09, 0.12],
      [0.05,  0.02, -0.12, 0.13],
      [-0.08, -0.03, -0.08, 0.11]
    ];
    let biggest = null;
    const cDeep  = new THREE.Color(0x1f2855);
    const cMid   = new THREE.Color(0x3a4f8a);
    const cBloom = new THREE.Color(0x8fa3cc);  // dusty top
    const cTmp   = new THREE.Color();
    for (const [ox, oy, oz, r] of offsets) {
      const geom = new THREE.SphereGeometry(r, 36, 28);
      const pos = geom.attributes.position;
      // Calyx scar dimple at top
      for (let i = 0; i < pos.count; i++) {
        const py = pos.getY(i);
        if (py > r * 0.88) {
          const t = (py - r * 0.88) / (r * 0.12);
          pos.setY(i, py - t * 0.015);
        }
      }
      geom.computeVertexNormals();
      // Vertex colour: dusty-blue bloom near top, deep blue underside
      const colors = new Float32Array(pos.count * 3);
      for (let i = 0; i < pos.count; i++) {
        const ny = (pos.getY(i) + r) / (2 * r);
        const bloom = smoothstep01((ny - 0.68) / 0.18);
        if (ny < 0.5) cTmp.copy(cDeep).lerp(cMid, ny * 2);
        else          cTmp.copy(cMid).lerp(cBloom, bloom);
        colors[i*3] = cTmp.r; colors[i*3+1] = cTmp.g; colors[i*3+2] = cTmp.b;
      }
      geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff, vertexColors: true,
        roughness: 0.72, metalness: 0.0, envMapIntensity: 0.60
      });
      registerFruitMaterial(mat);
      const m = new THREE.Mesh(geom, mat);
      m.position.set(ox, oy, oz);
      group.add(m);
      if (!biggest || r > biggest.geometry.parameters.radius) biggest = m;
    }
    return { root: group, body: biggest };
  }

  /* ---------- Compose the solar system ----------
   * Roughly Keplerian: tighter orbits → faster, wider → slower.
   * Inclinations vary so orbital planes aren't all coplanar.
   */
  // Eight orbiters — a mix of fruits (orange, mango, strawberry, banana,
  // blueberries) and the Chonk ingredients that go INTO the shake
  // (milk glob, honey glob, protein-powder scoop). Phased 360° around
  // the cup so every angle of the rotation shows something. Rough
  // Keplerian pattern: tighter orbits → faster.
  // Orbiters — phases spaced exactly 2π/8 = 45° apart for even
  // distribution around the cup. Radii, heights and inclinations still
  // vary so the cloud has 3D depth and they don't line up as a ring.
  // Rough Keplerian: larger orbits are slower.
  const FRUIT_PHASE_STEP = (Math.PI * 2) / 8;
  addFruitToOrbit(...Object.values(buildOrange(0.38)),      { radius: 3.00, speed: 0.28, phase: FRUIT_PHASE_STEP * 0, inclination:  0.22, planeY: -0.70, axialSpin: 0.45 });
  addFruitToOrbit(...Object.values(buildMango()),           { radius: 3.60, speed: 0.22, phase: FRUIT_PHASE_STEP * 1, inclination: -0.32, planeY: -0.30, axialSpin: 0.30, baseRotZ:  0.25 });
  addFruitToOrbit(...Object.values(buildBanana()),          { radius: 3.90, speed: 0.20, phase: FRUIT_PHASE_STEP * 2, inclination:  0.30, planeY: -1.20, axialSpin: 0.55, baseRotZ:  0.40, baseScale: 0.90 });
  addFruitToOrbit(...Object.values(buildStrawberry()),      { radius: 2.00, speed: 0.46, phase: FRUIT_PHASE_STEP * 3, inclination:  0.14, planeY: -0.50, axialSpin: 0.60, baseRotZ:  0.12, baseScale: 0.95 });
  addFruitToOrbit(...Object.values(buildHoneyGlob()),       { radius: 2.70, speed: 0.34, phase: FRUIT_PHASE_STEP * 4, inclination: -0.18, planeY: -1.00, axialSpin: 0.70,                  baseScale: 1.00 });
  addFruitToOrbit(...Object.values(buildBlueberryCluster()),{ radius: 3.30, speed: 0.24, phase: FRUIT_PHASE_STEP * 5, inclination: -0.10, planeY: -0.40, axialSpin: 0.50,                  baseScale: 1.05 });
  addFruitToOrbit(...Object.values(buildProteinPowder()),   { radius: 4.20, speed: 0.16, phase: FRUIT_PHASE_STEP * 6, inclination:  0.24, planeY: -1.10, axialSpin: 0.35,                  baseScale: 1.10 });
  addFruitToOrbit(...Object.values(buildMilkGlob()),        { radius: 2.40, speed: 0.40, phase: FRUIT_PHASE_STEP * 7, inclination:  0.08, planeY: -0.60, axialSpin: 0.60,                  baseScale: 1.00 });

  // Build a very faint guide ring for each orbit — tilted/positioned
  // to match that orbit's plane. Subtle: additive pink at 0.09 alpha,
  // thin 96-segment line, fades with the cup at tunnel entry.
  (function buildOrbitRings() {
    for (const o of fruitOrbits) {
      const SEG = 96;
      const positions = new Float32Array((SEG + 1) * 3);
      for (let i = 0; i <= SEG; i++) {
        const a = (i / SEG) * Math.PI * 2;
        positions[i*3]     = Math.cos(a) * o.radius;
        positions[i*3 + 1] = 0;
        positions[i*3 + 2] = Math.sin(a) * o.radius;
      }
      const ringGeom = new THREE.BufferGeometry();
      ringGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const ring = new THREE.LineLoop(ringGeom, orbitRingMat);
      ring.rotation.x = o.inclination;
      ring.position.y = o.planeY;
      orbitRingGroup.add(ring);
    }
  })();

  // Straw is part of the blueprint crossfade again (with its richer
  // cylindrical wireframe), so the whole outer-cup fades as one group.
  const blueprintFadeMeshes = [cupMesh, baseRing, lidDome, lidSkirt, seam, strawMesh, strawHole];

  const blueprintFadeMaterials = [];
  (function collectFadeMaterials() {
    const seen = new Set();
    for (const m of blueprintFadeMeshes) {
      if (seen.has(m.material)) continue;
      seen.add(m.material);
      m.material.transparent = true;
      blueprintFadeMaterials.push({ mat: m.material, baseOpacity: m.material.opacity ?? 1 });
    }
  })();

  /* ---------- Contact shadow plane ----------
   *
   * Sits in world-space (NOT parented to cupGroup) so it stays flat on
   * the implied ground as the cup tilts and rotates. Positioned just
   * below where the cup base meets the floor at world-space scale.
   * depthWrite is disabled so it doesn't occlude the cup base ring.
   */
  const contactShadowGeom = new THREE.PlaneGeometry(2.9, 2.9);
  const contactShadowMat = new THREE.MeshBasicMaterial({
    map: contactShadowTexture,
    transparent: true,
    opacity: 0.42,
    depthWrite: false,
    toneMapped: false
  });
  const contactShadow = new THREE.Mesh(contactShadowGeom, contactShadowMat);
  contactShadow.rotation.x = -Math.PI / 2;
  // Cup base sits at local y=-1.55, cupGroup is scaled by 0.85 → world-space
  // floor at y ≈ -1.32. Sit just below to avoid z-fighting with the base ring.
  contactShadow.position.y = -1.33;
  contactShadow.renderOrder = -1;
  scene.add(contactShadow);

  /* ---------- Amino-acid alpha-helix (revealed in the darkness) ----------
   *
   * A glowing protein α-helix lives further down the -Z axis, inside what
   * the camera perceives as the interior of the straw. It's hidden during
   * the establishing/rise/approach stages and fades up as we push past
   * the straw mouth. The geometry is simple but reads as biochemistry:
   *   - backbone: TubeGeometry on a CatmullRom α-helix curve
   *   - Cα atoms: small emissive spheres at each residue
   *   - side chains: outward beads in the brand's deep green
   * Materials are emissive + envMapIntensity=0 so they hold their glow
   * even when the studio environment fades to black.
   */
  const AMINO_ORIGIN = new THREE.Vector3(0.38, -1.5, -4.5);
  const aminoGroup = new THREE.Group();
  aminoGroup.position.copy(AMINO_ORIGIN);
  aminoGroup.visible = false;
  scene.add(aminoGroup);

  const aminoFadeMaterials = [];

  (function buildHelix() {
    const TURNS = 6;
    const SEGMENTS = TURNS * 48;
    const RADIUS = 0.22;
    const PITCH = 0.13; // vertical rise per turn
    const TOTAL_H = TURNS * PITCH;

    const bbPoints = [];
    for (let i = 0; i <= SEGMENTS; i++) {
      const f = i / SEGMENTS;
      const theta = f * TURNS * Math.PI * 2;
      const y = f * TOTAL_H - TOTAL_H / 2;
      bbPoints.push(new THREE.Vector3(
        RADIUS * Math.cos(theta), y, RADIUS * Math.sin(theta)
      ));
    }
    const bbCurve = new THREE.CatmullRomCurve3(bbPoints);
    const bbGeom = new THREE.TubeGeometry(bbCurve, SEGMENTS, 0.024, 12, false);
    const bbMat = new THREE.MeshStandardMaterial({
      color: 0xffd8f3,
      emissive: 0xffd8f3,
      emissiveIntensity: 1.1,
      roughness: 0.35,
      metalness: 0.0,
      envMapIntensity: 0.0,
      transparent: true,
      opacity: 0
    });
    aminoFadeMaterials.push(bbMat);
    aminoGroup.add(new THREE.Mesh(bbGeom, bbMat));

    const resGeom = new THREE.SphereGeometry(0.065, 22, 22);
    const resMat = new THREE.MeshStandardMaterial({
      color: 0xfef6ec,
      emissive: 0xfef6ec,
      emissiveIntensity: 0.85,
      roughness: 0.4,
      metalness: 0.0,
      envMapIntensity: 0.0,
      transparent: true,
      opacity: 0
    });
    aminoFadeMaterials.push(resMat);

    const scGeom = new THREE.SphereGeometry(0.048, 16, 16);
    const scMat = new THREE.MeshStandardMaterial({
      color: 0x3a5a40,
      emissive: 0x3a5a40,
      emissiveIntensity: 1.4,
      roughness: 0.4,
      metalness: 0.0,
      envMapIntensity: 0.0,
      transparent: true,
      opacity: 0
    });
    aminoFadeMaterials.push(scMat);

    const RESIDUES = TURNS * 4; // 24 Cα atoms
    for (let i = 0; i < RESIDUES; i++) {
      const f = i / RESIDUES;
      const theta = f * TURNS * Math.PI * 2;
      const y = f * TOTAL_H - TOTAL_H / 2;
      const nx = Math.cos(theta), nz = Math.sin(theta);
      const res = new THREE.Mesh(resGeom, resMat);
      res.position.set(RADIUS * nx, y, RADIUS * nz);
      aminoGroup.add(res);
      const sc = new THREE.Mesh(scGeom, scMat);
      sc.position.set((RADIUS + 0.13) * nx, y, (RADIUS + 0.13) * nz);
      aminoGroup.add(sc);
    }
  })();

  // Interior point lights — off at rest, warm up as the camera enters the
  // straw so the helix isn't just emissive-floating but catches a rim.
  const interiorLightPink = new THREE.PointLight(0xffd8f3, 0, 7, 2);
  interiorLightPink.position.set(0.38, -1.5, -3.2);
  scene.add(interiorLightPink);

  const interiorLightWhite = new THREE.PointLight(0xffffff, 0, 5, 2);
  interiorLightWhite.position.set(0.70, -1.2, -4.0);
  scene.add(interiorLightWhite);

  /* ---------- Rendering pipeline ----------
   *
   * We render straight to the canvas (no EffectComposer / UnrealBloom).
   * Rationale:
   *   1. The canvas must stay alpha-transparent so the iframe composites
   *      over whatever page-background the host (Next.js) sets. Every
   *      EffectComposer target path wipes alpha to 1 during the final
   *      copy, even with HalfFloat targets and clearAlpha=0, because
   *      the bloom composite shader doesn't preserve the RenderPass
   *      alpha channel through additive blending.
   *   2. The HDRI env map + RectAreaLight already deliver the soft
   *      elongated highlight bloom was faking. Dropping the pass costs
   *      nothing visible and saves ~1.5ms/frame on mid-range laptops.
   *   3. Bloom was marked "Phase 6 — optional polish" in the brief.
   */

  /* ---------- State + interaction ---------- */
  const state = {
    mouseX: window.innerWidth / 2,
    mouseY: window.innerHeight / 2,
    camTargetX: 0,
    camTargetY: 0.15,
    camTargetZ: 9.5,
    scrollProgress: 0,
    cupRotY: 0,
    cupRotX: 0,
    cupPosY: 0,
    // Drag-to-spin layer — persistent rotation offset added on top of
    // the scroll-driven rotation. Carries inertia after release.
    dragRotY: 0,
    dragVelY: 0,
    isDragging: false,
    dragStartX: 0,
    dragStartRotY: 0,
    hasInteracted: false
  };

  cupGroup.scale.setScalar(CUP_SCALE);

  // Cursor-follow rebound: raycast to find the orbit under the cursor,
  // push it in the direction of cursor movement, then spring-physics in
  // the animate loop swings it back to its orbital path.
  const hoverRay = new THREE.Raycaster();
  const hoverNDC = new THREE.Vector2();
  const HOVER_IMPULSE_GAIN = 0.0030; // screen-pixel → world-unit scale
  const HOVER_IMPULSE_CLAMP = 0.18;
  function handleHoverCursor(e) {
    state.mouseX = e.clientX;
    state.mouseY = e.clientY;
    const dx = e.movementX || 0;
    const dy = e.movementY || 0;
    if (dx === 0 && dy === 0) return;
    hoverNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
    hoverNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
    hoverRay.setFromCamera(hoverNDC, camera);
    // Cast against all orbit meshes (recursive so we hit Group children).
    const candidates = [];
    for (const o of fruitOrbits) candidates.push(o.mesh);
    const hits = hoverRay.intersectObjects(candidates, true);
    if (hits.length === 0) return;
    let node = hits[0].object;
    let orbit = null;
    while (node && !orbit) {
      if (node.userData && node.userData.orbitRef) orbit = node.userData.orbitRef;
      node = node.parent;
    }
    if (!orbit) return;
    // Screen movement → world axes at the hit distance.
    const camDist = camera.position.distanceTo(hits[0].point);
    const worldPerPx = (2 * Math.tan((camera.fov * Math.PI) / 360) * camDist) / window.innerHeight;
    let impX =  dx * worldPerPx * HOVER_IMPULSE_GAIN * 60;
    let impY = -dy * worldPerPx * HOVER_IMPULSE_GAIN * 60;
    // Clamp so a wild swipe doesn't fling an orbiter into next week.
    const mag = Math.hypot(impX, impY);
    if (mag > HOVER_IMPULSE_CLAMP) {
      const k = HOVER_IMPULSE_CLAMP / mag;
      impX *= k; impY *= k;
    }
    orbit.hoverVelX += impX;
    orbit.hoverVelY += impY;
  }
  window.addEventListener('mousemove', handleHoverCursor, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!e.touches[0]) return;
    state.mouseX = e.touches[0].clientX;
    state.mouseY = e.touches[0].clientY;
  }, { passive: true });

  /* ---------- Drag-to-spin ----------
   * Press (mouse or touch) anywhere over the canvas and drag horizontally
   * to spin the cup around its vertical axis. Release and it carries a
   * little inertia before settling. Works on top of scroll rotation.
   */
  const DRAG_SENSITIVITY = 0.01;   // radians per px dragged
  const DRAG_FRICTION    = 0.93;   // inertia decay per frame
  const DRAG_FLING_GAIN  = 0.35;   // how much release velocity becomes spin

  let lastDragX = 0;
  let lastDragT = 0;
  let dragInstVel = 0;

  function onDragStart(clientX) {
    state.isDragging = true;
    state.dragStartX = clientX;
    state.dragStartRotY = state.dragRotY;
    state.dragVelY = 0;
    lastDragX = clientX;
    lastDragT = performance.now();
    dragInstVel = 0;
    state.hasInteracted = true;
    document.body.classList.add('dragging');
  }
  function onDragMove(clientX) {
    if (!state.isDragging) return;
    const now = performance.now();
    const dt = Math.max(1, now - lastDragT);
    const dx = clientX - lastDragX;
    dragInstVel = (dx / dt) * 16.6; // normalise to ~60fps frame-px
    lastDragX = clientX;
    lastDragT = now;
    state.dragRotY = state.dragStartRotY + (clientX - state.dragStartX) * DRAG_SENSITIVITY;
  }
  function onDragEnd() {
    if (!state.isDragging) return;
    state.isDragging = false;
    state.dragVelY = dragInstVel * DRAG_SENSITIVITY * DRAG_FLING_GAIN * 60;
